<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>⚽ 足球遊戲</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: #0d0d1a;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            font-family: 'Segoe UI', Arial, sans-serif;
            color: white;
            user-select: none;
        }
        #gameCanvas {
            border: 3px solid #334;
            border-radius: 6px;
            box-shadow: 0 0 30px rgba(68, 136, 255, 0.3);
            display: block;
            touch-action: none; /* 防止觸碰 canvas 時觸發頁面捲動或縮放 */
        }

        /* ===== 手機響應式（螢幕寬度 < 860px 時縮放） ===== */
        @media (max-width: 860px) {
            body { justify-content: flex-start; padding-top: 0; }
            #gameCanvas { width: 100vw; height: auto; border-radius: 0; border-left: none; border-right: none; }
            #difficultyPanel { width: 100%; padding: 0 8px; }
            #bottom-bar { width: 100%; padding: 0 8px; flex-wrap: wrap; gap: 4px; }
        }

        /* ===== 難度選擇面板 ===== */
        #difficultyPanel {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-top: 14px;
        }
        #diffLabel {
            color: #778;
            font-size: 14px;
            margin-right: 4px;
        }
        .diff-btn {
            padding: 7px 22px;
            border: 2px solid #334;
            border-radius: 20px;
            background: #141428;
            color: #778;
            font-size: 15px;
            font-family: inherit;
            cursor: pointer;
            transition: all 0.18s;
            outline: none;
            letter-spacing: 1px;
        }
        .diff-btn:hover { background: #1e1e3a; color: #bbb; }

        /* 各難度啟用樣式 */
        .diff-btn.easy.active   { border-color: #44dd88; color: #44dd88; background: #0a2e1a; }
        .diff-btn.medium.active { border-color: #ffaa22; color: #ffaa22; background: #2a1800; }
        .diff-btn.hard.active   { border-color: #ff4455; color: #ff4455; background: #2a0008; }

        #bottom-bar {
            display: flex;
            align-items: center;
            justify-content: space-between;
            width: 820px;
            margin-top: 8px;
        }
        #controls {
            font-size: 12px;
            color: #556;
            letter-spacing: 0.5px;
        }
        #credit {
            font-size: 12px;
            color: #445;
            letter-spacing: 0.5px;
        }
        #credit span {
            color: #7799cc;
            font-weight: bold;
        }
    </style>
</head>
<body>
    <canvas id="gameCanvas" width="820" height="620"></canvas>

    <!-- 難度選擇按鈕（遊玩中也可切換） -->
    <div id="difficultyPanel">
        <span id="diffLabel">難度：</span>
        <button class="diff-btn easy"   onclick="setDifficulty('easy')">簡單</button>
        <button class="diff-btn medium active" onclick="setDifficulty('medium')">普通</button>
        <button class="diff-btn hard"   onclick="setDifficulty('hard')">困難</button>
    </div>
    <div id="bottom-bar">
        <div id="controls">⬆⬇⬅➡ 移動 &nbsp;|&nbsp; 雙擊加速 &nbsp;|&nbsp; Space 射門 &nbsp;|&nbsp; ESC 暫停/繼續 &nbsp;|&nbsp; Q 返回選單</div>
        <div id="credit">Deployed by <span>Kyle Cheng</span></div>
    </div>

    <script>
    // =====================================================
    //   ⚽ 足球遊戲 v2
    //   操作：方向鍵移動、雙擊加速、Z 射門
    //        Space 暫停/繼續、ESC 返回選單
    // =====================================================

    const canvas = document.getElementById('gameCanvas');
    const ctx    = canvas.getContext('2d');
    const CW = canvas.width;
    const CH = canvas.height;

    // ---------- 球場尺寸 ----------
    const FIELD = {
        left: 70, right: 750, top: 90, bottom: 570,
    };
    FIELD.width   = FIELD.right  - FIELD.left;
    FIELD.height  = FIELD.bottom - FIELD.top;
    FIELD.centerX = FIELD.left + FIELD.width  / 2;
    FIELD.centerY = FIELD.top  + FIELD.height / 2;

    // ---------- 球門 ----------
    const GOAL_W = 18;
    const GOAL_H = 130;
    const GOAL_Y = FIELD.centerY - GOAL_H / 2;

    // ---------- 玩家固定常數 ----------
    const PLAYER_R  = 22;
    const BALL_R    = 10;
    const P_SPEED   = 3.2;   // 玩家正常速度
    const P_SPRINT  = 5.8;   // 玩家衝刺速度
    const SHOOT_SPD = 9.5;   // 射門速度
    const FRICTION  = 0.963; // 球的摩擦係數
    const DBL_TAP_MS    = 300; // 雙擊判定窗口（ms）
    const SPRINT_FRAMES = 75;  // 衝刺持續幀數
    const TACKLE_FRAMES = 60;  // 電腦搶球所需持續接觸幀數（60幀 ≈ 1秒）

    // =====================================================
    //   難度設定（電腦速度、衝刺冷卻）
    //   各難度速度已調降 50%
    // =====================================================
    const DIFF_SETTINGS = {
        easy: {
            label:       '簡單',
            cSpeed:      0.75,  // 電腦正常移速（原 1.5 × 50%）
            cSprint:     1.3,   // 電腦衝刺移速（原 2.6 × 50%）
            coolMin:     280,   // 衝刺冷卻最短幀數
            coolMax:     480,   // 衝刺冷卻最長幀數
            shootDist:   110,   // 電腦在距左門幾 px 內射門
            color:       '#44dd88',
        },
        medium: {
            label:       '普通',
            cSpeed:      1.1,   // 原 2.2 × 50%
            cSprint:     2.1,   // 原 4.2 × 50%
            coolMin:     160,
            coolMax:     300,
            shootDist:   130,
            color:       '#ffaa22',
        },
        hard: {
            label:       '困難',
            cSpeed:      1.7,   // 原 3.4 × 50%
            cSprint:     3.1,   // 原 6.2 × 50%
            coolMin:     60,
            coolMax:     140,
            shootDist:   160,
            color:       '#ff4455',
        },
    };

    // 目前難度（預設：普通）
    let currentDiff = 'medium';

    /**
     * 切換難度：更新變數並同步按鈕樣式
     */
    function setDifficulty(level) {
        currentDiff = level;
        document.querySelectorAll('.diff-btn').forEach(b => b.classList.remove('active'));
        document.querySelector(`.diff-btn.${level}`).classList.add('active');
    }

    // =====================================================
    //   遊戲狀態
    // =====================================================
    let player   = {};
    let computer = {};
    let ball     = {};

    let playerScore   = 0;
    let computerScore = 0;

    // 遊戲階段：'start' | 'playing' | 'paused' | 'goal'
    let phase     = 'start';
    let goalTimer = 0;
    let goalMsg   = '';

    // 射門後短暫冷卻，防止立刻被自己搶到
    let stealCooldown = 0;

    // 電腦搶球計時器：電腦持續接觸玩家累積幀數，達到 TACKLE_FRAMES 才成功搶球
    let tackleTimer = 0;

    // 觸控搖桿狀態（提前宣告，updatePlayer 需要讀取）
    const joyState = {
        active: false, touchId: null,
        baseX: 0, baseY: 0, thumbX: 0, thumbY: 0,
        dx: 0, dy: 0, magnitude: 0, MAX_R: 62,
    };

    // =====================================================
    //   鍵盤
    // =====================================================
    const keysDown = {};
    const keyLastPressTime = {
        ArrowUp: 0, ArrowDown: 0, ArrowLeft: 0, ArrowRight: 0
    };

    window.addEventListener('keydown', e => {
        // 攔截會讓頁面捲動或焦點離開的鍵（含 Escape，防止瀏覽器搶走焦點）
        if (['ArrowUp','ArrowDown','ArrowLeft','ArrowRight','Space','Escape'].includes(e.code)) {
            e.preventDefault();
        }

        // ── ESC：暫停 / 繼續 ────────────────────────────
        if (e.code === 'Escape') {
            if (phase === 'playing') {
                phase = 'paused';
            } else if (phase === 'paused') {
                phase = 'playing';
            }
            // ESC 按下後強制把焦點拉回頁面，防止瀏覽器搶走焦點導致後續 Q 失效
            document.body.focus();
            keysDown[e.code] = true;
            return;
        }

        // ── Q：從暫停畫面回到主選單（重置比分）─────────
        if (e.code === 'KeyQ') {
            if (phase === 'paused') {
                phase         = 'start';
                playerScore   = 0;
                computerScore = 0;
                initPositions();
            }
            keysDown[e.code] = true;
            return;
        }

        // ── Space：開始畫面時開始遊戲 ──────────────────
        if (e.code === 'Space') {
            if (phase === 'start') {
                phase = 'playing';
                keysDown[e.code] = true;
                return;
            }
        }

        // ── 開始畫面：任意（非功能）鍵開始 ────────────
        if (phase === 'start') {
            phase = 'playing';
            keysDown[e.code] = true;
            return;
        }

        // 以下只在 'playing' 相關狀態下有效
        if (phase !== 'playing') {
            keysDown[e.code] = true;
            return;
        }

        if (!keysDown[e.code]) {
            // ── 雙擊方向鍵 → 衝刺 ──────────────────────
            if (e.code in keyLastPressTime) {
                const now = performance.now();
                if (now - keyLastPressTime[e.code] < DBL_TAP_MS) {
                    player.sprintFrames = SPRINT_FRAMES;
                }
                keyLastPressTime[e.code] = now;
            }

            // ── Space 鍵 → 射門 ─────────────────────────
            if (e.code === 'Space' && player.hasBall && phase === 'playing') {
                doPlayerShoot();
            }
        }

        keysDown[e.code] = true;
    });

    window.addEventListener('keyup', e => {
        keysDown[e.code] = false;
    });


    // =====================================================
    //   初始化
    // =====================================================
    function initPositions() {
        const ds = DIFF_SETTINGS[currentDiff];

        player = {
            x: FIELD.left + FIELD.width * 0.22, y: FIELD.centerY,
            vx: 0, vy: 0,
            hasBall: false, sprintFrames: 0,
            facingX: 1, facingY: 0,
            color: '#3399ff',
        };

        computer = {
            x: FIELD.left + FIELD.width * 0.78, y: FIELD.centerY,
            vx: 0, vy: 0,
            hasBall: false, sprintFrames: 0,
            // 初始衝刺冷卻從難度設定取得
            sprintCooldown: ds.coolMin + Math.floor(Math.random() * (ds.coolMax - ds.coolMin)),
            facingX: -1, facingY: 0,
            color: '#ff4455',
        };

        stealCooldown = 0;
        tackleTimer   = 0;
        spawnBall();
    }

    function spawnBall() {
        player.hasBall   = false;
        computer.hasBall = false;
        ball = {
            x: FIELD.left + FIELD.width  * (0.30 + Math.random() * 0.40),
            y: FIELD.top  + FIELD.height * (0.20 + Math.random() * 0.60),
            vx: 0, vy: 0,
            free: true,
        };
    }

    // =====================================================
    //   玩家更新
    // =====================================================
    function updatePlayer() {
        let dx = 0, dy = 0;

        // ── 鍵盤輸入 ─────────────────────────────────
        if (keysDown['ArrowLeft'])  dx -= 1;
        if (keysDown['ArrowRight']) dx += 1;
        if (keysDown['ArrowUp'])    dy -= 1;
        if (keysDown['ArrowDown'])  dy += 1;

        // ── 觸控搖桿輸入（與鍵盤疊加）───────────────
        if (joyState.active) {
            dx += joyState.dx;
            dy += joyState.dy;
        }

        // 正規化：避免鍵盤+觸控疊加時速度超過 1
        const inputMag = Math.sqrt(dx * dx + dy * dy);
        if (inputMag > 1) { dx /= inputMag; dy /= inputMag; }

        // ── 衝刺計算 ─────────────────────────────────
        if (player.sprintFrames > 0) player.sprintFrames--;
        // 搖桿推超過 85% 也觸發衝刺效果（不消耗 sprintFrames）
        const isTouchSprint = joyState.active && joyState.magnitude > 0.85;
        const spd = (player.sprintFrames > 0 || isTouchSprint) ? P_SPRINT : P_SPEED;

        player.vx = dx * spd;
        player.vy = dy * spd;

        if (inputMag > 0.05) {
            player.facingX = dx / inputMag;
            player.facingY = dy / inputMag;
        }

        player.x += player.vx;
        player.y += player.vy;
        clampToField(player);

        if (player.hasBall) carryBall(player);
    }

    function doPlayerShoot() {
        playShootSound();
        player.hasBall = false;
        ball.free = true;
        let sx = player.facingX, sy = player.facingY;
        if (sx === 0 && sy === 0) sx = 1;
        const mag = Math.sqrt(sx * sx + sy * sy);
        ball.x  = player.x + (sx / mag) * (PLAYER_R + BALL_R + 3);
        ball.y  = player.y + (sy / mag) * (PLAYER_R + BALL_R + 3);
        ball.vx = (sx / mag) * SHOOT_SPD;
        ball.vy = (sy / mag) * SHOOT_SPD;
        stealCooldown = 20;
    }

    // =====================================================
    //   電腦 AI（速度由目前難度決定）
    // =====================================================
    function updateComputer() {
        const ds = DIFF_SETTINGS[currentDiff]; // 讀取目前難度設定

        // 衝刺計時
        if (computer.sprintFrames  > 0) computer.sprintFrames--;
        if (computer.sprintCooldown > 0) computer.sprintCooldown--;
        if (computer.sprintCooldown <= 0) {
            computer.sprintFrames   = SPRINT_FRAMES;
            computer.sprintCooldown = ds.coolMin + Math.floor(Math.random() * (ds.coolMax - ds.coolMin));
        }

        const spd = (computer.sprintFrames > 0) ? ds.cSprint : ds.cSpeed;

        let targetX, targetY;

        if (computer.hasBall) {
            // 帶球往左側球門（玩家門）靠近
            targetX = FIELD.left;
            targetY = GOAL_Y + GOAL_H / 2;

            // 靠近球門時自動射門
            if (computer.x - FIELD.left < ds.shootDist) {
                doComputerShoot();
                return;
            }
        } else {
            // 無球：追球
            targetX = ball.x;
            targetY = ball.y;
        }

        const dx   = targetX - computer.x;
        const dy   = targetY - computer.y;
        const dist = Math.sqrt(dx * dx + dy * dy) || 1;

        computer.vx = (dx / dist) * spd;
        computer.vy = (dy / dist) * spd;
        computer.facingX = dx / dist;
        computer.facingY = dy / dist;

        computer.x += computer.vx;
        computer.y += computer.vy;
        clampToField(computer);

        if (computer.hasBall) carryBall(computer);
    }

    function doComputerShoot() {
        playShootSound();
        computer.hasBall = false;
        ball.free = true;
        const goalCX = FIELD.left - GOAL_W / 2;
        const goalCY = GOAL_Y + GOAL_H / 2;
        const dx     = goalCX - ball.x;
        const dy     = goalCY - ball.y;
        const dist   = Math.sqrt(dx * dx + dy * dy) || 1;
        ball.x  = computer.x + (dx / dist) * (PLAYER_R + BALL_R + 3);
        ball.y  = computer.y + (dy / dist) * (PLAYER_R + BALL_R + 3);
        ball.vx = (dx / dist) * SHOOT_SPD;
        ball.vy = (dy / dist) * SHOOT_SPD;
        stealCooldown = 20;
    }

    // =====================================================
    //   帶球 / 搶球
    // =====================================================
    function carryBall(actor) {
        ball.x = actor.x + actor.facingX * (PLAYER_R + BALL_R);
        ball.y = actor.y + actor.facingY * (PLAYER_R + BALL_R);
        ball.x = Math.max(FIELD.left + BALL_R, Math.min(FIELD.right - BALL_R, ball.x));
        ball.y = Math.max(FIELD.top  + BALL_R, Math.min(FIELD.bottom - BALL_R, ball.y));
        ball.vx = 0; ball.vy = 0;
    }

    function checkCollisions() {
        if (stealCooldown > 0) { stealCooldown--; tackleTimer = 0; return; }

        const pBall  = dist2(player.x, player.y, ball.x, ball.y);
        const cBall  = dist2(computer.x, computer.y, ball.x, ball.y);
        const pComp  = dist2(player.x, player.y, computer.x, computer.y);
        const pickR2 = (PLAYER_R + BALL_R) * (PLAYER_R + BALL_R);
        const tackR2 = (PLAYER_R * 2 - 4)  * (PLAYER_R * 2 - 4);

        if (!player.hasBall && !computer.hasBall) {
            // 無人帶球：誰先碰到球誰帶球
            tackleTimer = 0;
            if (pBall < cBall && pBall < pickR2) {
                player.hasBall = true; ball.free = false;
            } else if (cBall < pickR2) {
                computer.hasBall = true; ball.free = false;
            }

        } else if (player.hasBall) {
            // 玩家帶球：電腦需持續接觸 TACKLE_FRAMES 幀才能搶球
            if (pComp < tackR2) {
                tackleTimer++;
                if (tackleTimer >= TACKLE_FRAMES) {
                    // 持續接觸滿 1 秒，搶球成功
                    player.hasBall = false; computer.hasBall = true;
                    ball.free = false; stealCooldown = 30; tackleTimer = 0;
                }
                // 未滿 1 秒：僅累積計時，玩家仍持球
            } else {
                // 接觸中斷：重置計時器
                tackleTimer = 0;
            }

        } else if (computer.hasBall) {
            // 電腦帶球：玩家碰到電腦則立即搶球（玩家搶球仍是即時）
            tackleTimer = 0;
            if (pComp < tackR2) {
                computer.hasBall = false; player.hasBall = true;
                ball.free = false; stealCooldown = 30;
            }
        }
    }

    // =====================================================
    //   球的物理
    // =====================================================
    function updateBall() {
        if (!ball.free) return;

        ball.x += ball.vx;
        ball.y += ball.vy;
        ball.vx *= FRICTION;
        ball.vy *= FRICTION;
        if (Math.abs(ball.vx) < 0.05) ball.vx = 0;
        if (Math.abs(ball.vy) < 0.05) ball.vy = 0;

        // 上下邊界反彈
        if (ball.y - BALL_R < FIELD.top)    { ball.y = FIELD.top    + BALL_R; ball.vy =  Math.abs(ball.vy) * 0.65; }
        if (ball.y + BALL_R > FIELD.bottom) { ball.y = FIELD.bottom - BALL_R; ball.vy = -Math.abs(ball.vy) * 0.65; }

        // 左右邊界：非球門開口則反彈
        const inGoalY = ball.y > GOAL_Y && ball.y < GOAL_Y + GOAL_H;
        if (ball.x - BALL_R < FIELD.left  && !inGoalY) { ball.x = FIELD.left  + BALL_R; ball.vx =  Math.abs(ball.vx) * 0.65; }
        if (ball.x + BALL_R > FIELD.right && !inGoalY) { ball.x = FIELD.right - BALL_R; ball.vx = -Math.abs(ball.vx) * 0.65; }
    }

    // =====================================================
    //   進球判定
    // =====================================================
    function checkGoals() {
        // 右側球門（電腦門）：玩家得分
        if (ball.x - BALL_R > FIELD.right && ball.y > GOAL_Y && ball.y < GOAL_Y + GOAL_H) {
            playerScore++; triggerGoal('⚽ 玩家得分！'); return;
        }
        if (player.hasBall && player.x + PLAYER_R > FIELD.right + GOAL_W * 0.5
            && player.y > GOAL_Y && player.y < GOAL_Y + GOAL_H) {
            playerScore++; triggerGoal('⚽ 玩家得分！'); return;
        }

        // 左側球門（玩家門）：電腦得分
        if (ball.x + BALL_R < FIELD.left && ball.y > GOAL_Y && ball.y < GOAL_Y + GOAL_H) {
            computerScore++; triggerGoal('💻 電腦得分！'); return;
        }
        if (computer.hasBall && computer.x - PLAYER_R < FIELD.left - GOAL_W * 0.5
            && computer.y > GOAL_Y && computer.y < GOAL_Y + GOAL_H) {
            computerScore++; triggerGoal('💻 電腦得分！'); return;
        }
    }

    function triggerGoal(msg) {
        playGoalSound();
        phase = 'goal'; goalMsg = msg; goalTimer = 130;
    }

    // =====================================================
    //   音效系統（Web Audio API，無需外部音效檔）
    // =====================================================
    let audioCtx = null;

    // 取得（或建立）AudioContext；瀏覽器要求需有用戶互動後才能播音
    function getAudioCtx() {
        if (!audioCtx) {
            audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        }
        if (audioCtx.state === 'suspended') audioCtx.resume();
        return audioCtx;
    }

    // 射門音效：短促踢球「碰！」聲（低頻衝擊 + 噪音摩擦）
    function playShootSound() {
        try {
            const ctx = getAudioCtx();
            const now = ctx.currentTime;

            // 低頻衝擊（模擬腳踢球的悶響）
            const osc  = ctx.createOscillator();
            const gain = ctx.createGain();
            osc.connect(gain);
            gain.connect(ctx.destination);
            osc.type = 'sine';
            osc.frequency.setValueAtTime(160, now);
            osc.frequency.exponentialRampToValueAtTime(55, now + 0.10);
            gain.gain.setValueAtTime(0.7, now);
            gain.gain.exponentialRampToValueAtTime(0.001, now + 0.13);
            osc.start(now);
            osc.stop(now + 0.13);

            // 短暫白噪音（模擬球皮摩擦聲）
            const buf  = ctx.createBuffer(1, Math.floor(ctx.sampleRate * 0.06), ctx.sampleRate);
            const data = buf.getChannelData(0);
            for (let i = 0; i < data.length; i++) data[i] = Math.random() * 2 - 1;
            const noise     = ctx.createBufferSource();
            const noiseGain = ctx.createGain();
            noise.buffer = buf;
            noise.connect(noiseGain);
            noiseGain.connect(ctx.destination);
            noiseGain.gain.setValueAtTime(0.18, now);
            noiseGain.gain.exponentialRampToValueAtTime(0.001, now + 0.06);
            noise.start(now);
        } catch (e) {}
    }

    // 得分音效：上升歡慶四音（C → E → G → 高C）
    function playGoalSound() {
        try {
            const ctx   = getAudioCtx();
            const now   = ctx.currentTime;
            const notes = [523, 659, 784, 1047]; // C5 E5 G5 C6

            notes.forEach((freq, i) => {
                const osc  = ctx.createOscillator();
                const gain = ctx.createGain();
                osc.connect(gain);
                gain.connect(ctx.destination);
                osc.type          = 'triangle'; // triangle 音色較清亮
                osc.frequency.value = freq;
                const t = now + i * 0.20;
                gain.gain.setValueAtTime(0, t);
                gain.gain.linearRampToValueAtTime(0.45, t + 0.02);
                gain.gain.exponentialRampToValueAtTime(0.001, t + 0.35);
                osc.start(t);
                osc.stop(t + 0.38);
            });
        } catch (e) {}
    }

    // =====================================================
    //   工具
    // =====================================================
    function dist2(ax, ay, bx, by) {
        return (ax - bx) * (ax - bx) + (ay - by) * (ay - by);
    }
    function clampToField(actor) {
        actor.x = Math.max(FIELD.left  + PLAYER_R, Math.min(FIELD.right  - PLAYER_R, actor.x));
        actor.y = Math.max(FIELD.top   + PLAYER_R, Math.min(FIELD.bottom - PLAYER_R, actor.y));
    }
    function lightenColor(hex, amount) {
        const num = parseInt(hex.replace('#', ''), 16);
        const r   = Math.min(255, (num >> 16) + amount);
        const g   = Math.min(255, ((num >> 8) & 0xff) + amount);
        const b   = Math.min(255, (num & 0xff) + amount);
        return `rgb(${r},${g},${b})`;
    }

    // =====================================================
    //   繪圖：球場
    // =====================================================
    function drawField() {
        // 頂部 HUD 背景
        ctx.fillStyle = '#111133';
        ctx.fillRect(0, 0, CW, FIELD.top);

        // 草地條紋
        const sw = FIELD.width / 8;
        for (let i = 0; i < 8; i++) {
            ctx.fillStyle = (i % 2 === 0) ? '#2e8b2e' : '#339933';
            ctx.fillRect(FIELD.left + i * sw, FIELD.top, sw, FIELD.height);
        }

        // 場地線
        ctx.strokeStyle = 'rgba(255,255,255,0.7)';
        ctx.lineWidth   = 2;
        ctx.strokeRect(FIELD.left, FIELD.top, FIELD.width, FIELD.height);
        // 中線
        ctx.beginPath(); ctx.moveTo(FIELD.centerX, FIELD.top); ctx.lineTo(FIELD.centerX, FIELD.bottom); ctx.stroke();
        // 中圈
        ctx.beginPath(); ctx.arc(FIELD.centerX, FIELD.centerY, 65, 0, Math.PI * 2); ctx.stroke();
        // 中心點
        ctx.fillStyle = 'white'; ctx.beginPath(); ctx.arc(FIELD.centerX, FIELD.centerY, 4, 0, Math.PI * 2); ctx.fill();

        // 禁區
        ctx.strokeStyle = 'rgba(255,255,255,0.45)'; ctx.lineWidth = 1.5;
        const bw = 85, bh = GOAL_H + 70, by = FIELD.centerY - bh / 2;
        ctx.strokeRect(FIELD.left,         by, bw,  bh);
        ctx.strokeRect(FIELD.right - bw,   by, bw,  bh);

        // 角球弧
        const corners = [
            [FIELD.left, FIELD.top, 0, Math.PI/2],
            [FIELD.right, FIELD.top, Math.PI/2, Math.PI],
            [FIELD.right, FIELD.bottom, Math.PI, Math.PI*1.5],
            [FIELD.left, FIELD.bottom, Math.PI*1.5, Math.PI*2],
        ];
        corners.forEach(([cx, cy, a1, a2]) => {
            ctx.beginPath(); ctx.arc(cx, cy, 18, a1, a2); ctx.stroke();
        });
    }

    // =====================================================
    //   繪圖：球門

    function drawGoals() {
        // 左側球門（玩家門）
        ctx.fillStyle = 'rgba(100,100,120,0.7)';

    // =====================================================
    //   繪圖：足球
    // =====================================================
    function drawBall() {
        const x = ball.x, y = ball.y;
        // 陰影
        ctx.beginPath(); ctx.ellipse(x, y + BALL_R + 2, BALL_R * 0.8, BALL_R * 0.3, 0, 0, Math.PI * 2);
        ctx.fillStyle = 'rgba(0,0,0,0.3)'; ctx.fill();
        // 白色球體
        ctx.beginPath(); ctx.arc(x, y, BALL_R, 0, Math.PI * 2);
        ctx.fillStyle = 'white'; ctx.fill();
        ctx.strokeStyle = '#222'; ctx.lineWidth = 1; ctx.stroke();
        // 黑色中心
        ctx.beginPath(); ctx.arc(x, y, BALL_R * 0.42, 0, Math.PI * 2);
        ctx.fillStyle = '#1a1a1a'; ctx.fill();
        // 五個花紋點
        for (let i = 0; i < 5; i++) {
            const a = (i / 5) * Math.PI * 2 - Math.PI / 2;
            ctx.beginPath(); ctx.arc(x + Math.cos(a) * BALL_R * 0.7, y + Math.sin(a) * BALL_R * 0.7, BALL_R * 0.18, 0, Math.PI * 2);
            ctx.fillStyle = '#1a1a1a'; ctx.fill();
        }
        // 高光
        ctx.beginPath(); ctx.arc(x - BALL_R * 0.3, y - BALL_R * 0.32, BALL_R * 0.28, 0, Math.PI * 2);
        ctx.fillStyle = 'rgba(255,255,255,0.65)'; ctx.fill();
    }

    // =====================================================
    //   繪圖：球員
    // =====================================================
    function drawActor(actor, label) {
        const x = actor.x, y = actor.y;
        const sp = actor.sprintFrames > 0;

        // 衝刺光暈
        if (sp) {
            ctx.beginPath(); ctx.arc(x, y, PLAYER_R + 7, 0, Math.PI * 2);
            ctx.strokeStyle = 'rgba(255,210,0,0.55)'; ctx.lineWidth = 4; ctx.stroke();
        }
        // 帶球外圈
        if (actor.hasBall) {
            ctx.beginPath(); ctx.arc(x, y, PLAYER_R + 6, 0, Math.PI * 2);
            ctx.strokeStyle = 'rgba(255,230,50,0.85)'; ctx.lineWidth = 3; ctx.stroke();
        }
        // 陰影
        ctx.beginPath(); ctx.ellipse(x, y + PLAYER_R, PLAYER_R * 0.85, PLAYER_R * 0.28, 0, 0, Math.PI * 2);
        ctx.fillStyle = 'rgba(0,0,0,0.25)'; ctx.fill();
        // 球員圓圈（漸層）
        const grad = ctx.createRadialGradient(x - PLAYER_R * 0.3, y - PLAYER_R * 0.3, 2, x, y, PLAYER_R);
        grad.addColorStop(0, lightenColor(actor.color, 40));
        grad.addColorStop(1, actor.color);
        ctx.beginPath(); ctx.arc(x, y, PLAYER_R, 0, Math.PI * 2);
        ctx.fillStyle = grad; ctx.fill();
        ctx.strokeStyle = actor.hasBall ? '#ffe040' : 'rgba(255,255,255,0.6)';
        ctx.lineWidth   = actor.hasBall ? 3 : 1.5; ctx.stroke();
        // 朝向眼睛
        const ex = x + actor.facingX * PLAYER_R * 0.45;
        const ey = y + actor.facingY * PLAYER_R * 0.45;
        ctx.beginPath(); ctx.arc(ex, ey, 4.5, 0, Math.PI * 2);
        ctx.fillStyle = 'white'; ctx.fill();
        ctx.beginPath(); ctx.arc(ex + actor.facingX, ey + actor.facingY, 2.5, 0, Math.PI * 2);
        ctx.fillStyle = '#222'; ctx.fill();
        // 標籤
        ctx.font = 'bold 12px Arial'; ctx.textAlign = 'center';
        ctx.fillStyle = 'white'; ctx.fillText(label, x, y + 4);
    }

    // =====================================================
    //   繪圖：電腦搶球進度圈
    //   當電腦正在搶球時，在玩家外側顯示紅色弧形進度條
    // =====================================================
    function drawTackleIndicator() {
        if (tackleTimer <= 0) return;

        const progress = tackleTimer / TACKLE_FRAMES; // 0.0 ~ 1.0
        const radius   = PLAYER_R + 11;
        const startA   = -Math.PI / 2;                // 從頂部開始順時針
        const endA     = startA + progress * Math.PI * 2;

        // 灰色底圈（背景軌道）
        ctx.beginPath();
        ctx.arc(player.x, player.y, radius, 0, Math.PI * 2);
        ctx.strokeStyle = 'rgba(255,255,255,0.15)';
        ctx.lineWidth   = 4;
        ctx.stroke();

        // 紅色進度弧（隨時間填滿）
        // 顏色從橘黃漸變到紅，快滿時閃爍
        const flash = (progress > 0.8) && (Math.floor(performance.now() / 120) % 2 === 0);
        ctx.beginPath();
        ctx.arc(player.x, player.y, radius, startA, endA);
        ctx.strokeStyle = flash ? '#ffffff' : `hsl(${30 - progress * 30}, 100%, 55%)`;
        ctx.lineWidth   = 4;
        ctx.lineCap     = 'round';
        ctx.stroke();
        ctx.lineCap = 'butt';

        // 進度百分比文字（顯示在進度圈旁邊）
        ctx.font      = 'bold 11px Arial';
        ctx.textAlign = 'center';
        ctx.fillStyle = flash ? 'white' : '#ffaa44';
        ctx.fillText('搶球 ' + Math.ceil(progress * 100) + '%', player.x, player.y - radius - 6);
    }

    // =====================================================
    //   主繪圖函式
    // =====================================================
    function draw() {
        ctx.clearRect(0, 0, CW, CH);
        drawField();
        drawGoals();
        drawBall();
        drawActor(computer, 'AI');  // 電腦先畫（玩家在上層）
        drawActor(player, 'P1');
        drawTackleIndicator();      // 搶球倒數進度圈（在球員上層）
        if (phase === 'playing') drawMobileControls(); // 觸控搖桿與射門按鈕
        drawHUD();

        // 各狀態的覆蓋層
        if (phase === 'goal')   drawGoalScreen();
        if (phase === 'paused') drawPauseScreen();
        if (phase === 'start')  drawStartScreen();
    }

    // =====================================================
    //   主更新函式
    // =====================================================
    function update() {
        // 暫停、開始選單、進球動畫 → 跳過遊戲邏輯
        if (phase === 'start' || phase === 'paused') return;

        if (phase === 'goal') {
            goalTimer--;
            if (goalTimer <= 0) {
                phase = 'playing';
                initPositions();
            }
            return;
        }

        // 正常遊戲更新
        updatePlayer();
        updateComputer();
        checkCollisions();
        updateBall();
        checkGoals();
    }

    // =====================================================
    //   主迴圈 + 啟動
    // =====================================================
    function gameLoop() {
        update();
        draw();
        requestAnimationFrame(gameLoop);
    }

    // 點擊 canvas 時把焦點拉回 document，確保鍵盤事件正常觸發
    canvas.addEventListener('click', () => canvas.focus());
    canvas.setAttribute('tabindex', '0');
    canvas.focus();

    // =====================================================
    //   觸控輸入（手機 / 平板）
    // =====================================================

    // 射門按鈕（左下角固定：左手射門，右手搖桿）
    const shootBtnTouch = {
        x: 82, y: CH - 88,
        radius: 58,
        pressed: false,
        touchId: null,
    };

    /** Touch 螢幕座標 → canvas 內部座標（處理 CSS 縮放） */
    function getTouchPos(touch) {
        const rect = canvas.getBoundingClientRect();
        return {
            x: (touch.clientX - rect.left) * (CW / rect.width),
            y: (touch.clientY - rect.top)  * (CH / rect.height),
        };
    }

    canvas.addEventListener('touchstart', e => {
        e.preventDefault();

        // 開始選單：任何觸碰都開始遊戲
        if (phase === 'start') {
            phase = 'playing';
            return;
        }
        // 暫停中：任何觸碰繼續遊戲
        if (phase === 'paused') {
            phase = 'playing';
            return;
        }

        Array.from(e.changedTouches).forEach(t => {
            const pos = getTouchPos(t);

            // 優先判斷：是否點到左下角射門按鈕
            const bdx = pos.x - shootBtnTouch.x;
            const bdy = pos.y - shootBtnTouch.y;
            if (bdx*bdx + bdy*bdy < shootBtnTouch.radius * shootBtnTouch.radius) {
                shootBtnTouch.pressed = true;
                shootBtnTouch.touchId = t.identifier;
                if (player.hasBall && phase === 'playing') doPlayerShoot();
                return;
            }

            // 其餘觸碰 → 啟動浮動搖桿
            if (!joyState.active) {
                joyState.active    = true;
                joyState.touchId   = t.identifier;
                joyState.baseX     = pos.x;
                joyState.baseY     = pos.y;
                joyState.thumbX    = pos.x;
                joyState.thumbY    = pos.y;
                joyState.dx        = 0;
                joyState.dy        = 0;
                joyState.magnitude = 0;
            }
        });
    }, { passive: false });

    canvas.addEventListener('touchmove', e => {
        e.preventDefault();
        Array.from(e.changedTouches).forEach(t => {
            if (t.identifier !== joyState.touchId) return;
            const pos = getTouchPos(t);
            let dx  = pos.x - joyState.baseX;
            let dy  = pos.y - joyState.baseY;
            const d = Math.sqrt(dx*dx + dy*dy);

            // 限制拇指在最大半徑內
            if (d > joyState.MAX_R) { dx = dx/d * joyState.MAX_R; dy = dy/d * joyState.MAX_R; }

            joyState.thumbX    = joyState.baseX + dx;
            joyState.thumbY    = joyState.baseY + dy;
            joyState.magnitude = Math.min(d / joyState.MAX_R, 1);

            if (d > 8) {
                joyState.dx = dx / joyState.MAX_R;
                joyState.dy = dy / joyState.MAX_R;
            } else {
                joyState.dx = 0; joyState.dy = 0;
            }
        });
    }, { passive: false });

    canvas.addEventListener('touchend', e => {
        e.preventDefault();
        Array.from(e.changedTouches).forEach(t => {
            if (t.identifier === joyState.touchId) {
                joyState.active = false; joyState.touchId = null;
                joyState.dx = 0; joyState.dy = 0; joyState.magnitude = 0;
            }
            if (t.identifier === shootBtnTouch.touchId) {
                shootBtnTouch.pressed = false; shootBtnTouch.touchId = null;
            }
        });
    }, { passive: false });

    // 觸控取消（電話來電等中斷）
    canvas.addEventListener('touchcancel', () => {
        joyState.active = false; joyState.touchId = null;
        joyState.dx = 0; joyState.dy = 0; joyState.magnitude = 0;
        shootBtnTouch.pressed = false; shootBtnTouch.touchId = null;
    }, { passive: false });

    // =====================================================
    //   繪圖：手機觸控介面（搖桿 + 射門按鈕）
    // =====================================================
    function drawMobileControls() {
        // ── 虛擬搖桿 ──────────────────────────────────
        if (joyState.active) {
            const bx = joyState.baseX, by = joyState.baseY;
            const tx = joyState.thumbX, ty = joyState.thumbY;

            // 外圈（活動範圍）
            ctx.beginPath();
            ctx.arc(bx, by, joyState.MAX_R, 0, Math.PI * 2);
            ctx.strokeStyle = 'rgba(255,255,255,0.28)';
            ctx.lineWidth   = 2;
            ctx.stroke();
            ctx.fillStyle = 'rgba(255,255,255,0.05)';
            ctx.fill();

            // 拇指圓圈（藍色）
            ctx.beginPath();
            ctx.arc(tx, ty, 26, 0, Math.PI * 2);
            ctx.fillStyle = joyState.magnitude > 0.85
                ? 'rgba(255,210,50,0.80)'  // 衝刺中 → 金黃色
                : 'rgba(90,155,255,0.75)'; // 一般 → 藍色
            ctx.fill();
            ctx.strokeStyle = 'rgba(200,220,255,0.8)';
            ctx.lineWidth = 2;
            ctx.stroke();

        } else {
            // 未觸碰：右下角顯示半透明提示圈（提示右手滑動區域）
            const hx = CW - 90, hy = CH - 92;
            ctx.beginPath();
            ctx.arc(hx, hy, joyState.MAX_R, 0, Math.PI * 2);
            ctx.strokeStyle = 'rgba(255,255,255,0.10)';
            ctx.lineWidth = 1.5;
            ctx.stroke();
            // 中心小圓
            ctx.beginPath();
            ctx.arc(hx, hy, 24, 0, Math.PI * 2);
            ctx.fillStyle = 'rgba(255,255,255,0.07)';
            ctx.fill();
            // 提示文字
            ctx.font = '11px Arial'; ctx.textAlign = 'center';
            ctx.fillStyle = 'rgba(255,255,255,0.18)';
            ctx.fillText('移動', hx, hy + 4);
        }

        // ── 射門按鈕（左下角固定，始終可見）────────────
        const sb = shootBtnTouch;
        ctx.beginPath();
        ctx.arc(sb.x, sb.y, sb.radius, 0, Math.PI * 2);
        ctx.fillStyle = sb.pressed ? 'rgba(255,75,35,0.90)' : 'rgba(210,55,25,0.42)';
        ctx.fill();
        ctx.strokeStyle = sb.pressed ? 'rgba(255,170,140,0.95)' : 'rgba(255,120,90,0.50)';
        ctx.lineWidth   = 2.5;
        ctx.stroke();

        ctx.font      = `bold ${sb.pressed ? 17 : 15}px Arial`;
        ctx.textAlign = 'center';
        ctx.fillStyle = sb.pressed ? 'white' : 'rgba(255,210,200,0.75)';
        ctx.fillText('射門', sb.x, sb.y + 5);
    }

    initPositions();
    gameLoop();
    </script>
</body>
</html>
