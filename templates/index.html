<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>⚽ 足球遊戲</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: #0d0d1a;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            font-family: 'Segoe UI', Arial, sans-serif;
            color: white;
            user-select: none;
        }
        #gameCanvas {
            border: 3px solid #334;
            border-radius: 6px;
            box-shadow: 0 0 30px rgba(68, 136, 255, 0.3);
            display: block;
            touch-action: none;
        }

        /* ===== 難度選擇面板（含暫停鈕）===== */
        #difficultyPanel {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-top: 14px;
            flex-wrap: wrap;
            justify-content: center;
        }
        #diffLabel { color: #778; font-size: 14px; margin-right: 4px; }
        .diff-btn {
            padding: 7px 22px;
            border: 2px solid #334;
            border-radius: 20px;
            background: #141428;
            color: #778;
            font-size: 15px;
            font-family: inherit;
            cursor: pointer;
            transition: all 0.18s;
            outline: none;
            letter-spacing: 1px;
            touch-action: manipulation;
            -webkit-tap-highlight-color: transparent;
        }
        .diff-btn:hover { background: #1e1e3a; color: #bbb; }
        .diff-btn.easy.active   { border-color: #44dd88; color: #44dd88; background: #0a2e1a; }
        .diff-btn.medium.active { border-color: #ffaa22; color: #ffaa22; background: #2a1800; }
        .diff-btn.hard.active   { border-color: #ff4455; color: #ff4455; background: #2a0008; }
        .diff-btn.hell.active   { border-color: #ff2200; color: #ff2200; background: #1a0000; }

        /* 暫停鈕（困難鈕右方）*/
        #pauseBtn {
            padding: 7px 20px;
            border: 2px solid #445566;
            border-radius: 20px;
            background: #141428;
            color: #889;
            font-size: 15px;
            font-family: inherit;
            cursor: pointer;
            touch-action: manipulation;
            -webkit-tap-highlight-color: transparent;
            outline: none;
            transition: all 0.18s;
            letter-spacing: 1px;
        }
        #pauseBtn:hover  { background: #1e1e3a; color: #ffe040; border-color: #665500; }
        #pauseBtn:active { background: #2a2010; color: #ffe040; border-color: #886600; }

        /* ===== Bottom bar（桌面顯示，手機隱藏）===== */
        #bottom-bar {
            display: flex;
            align-items: center;
            justify-content: space-between;
            width: 820px;
            margin-top: 8px;
        }
        #controls { font-size: 12px; color: #556; letter-spacing: 0.5px; }
        #credit    { font-size: 12px; color: #445; letter-spacing: 0.5px; }
        #credit span { color: #7799cc; font-weight: bold; }

        /* ===== 手機直式（portrait）===== */
        @media (max-width: 860px) {
            body { justify-content: flex-start; padding-top: 0; }
            #gameCanvas {
                width: 100vw; height: auto;
                border-radius: 0; border-left: none; border-right: none;
            }
            #difficultyPanel { width: 100%; padding: 0 8px; }
            #bottom-bar { display: none; }
        }

        /* ===== 手機橫式（landscape）===== */
        @media (max-width: 860px) and (orientation: landscape) {
            body { justify-content: flex-start; }
            #gameCanvas {
                width: auto;
                max-height: calc(100dvh - 46px);
                max-width: 100vw;
                height: auto;
                border-radius: 0;
            }
            #difficultyPanel { margin-top: 4px; gap: 6px; }
            .diff-btn  { padding: 4px 14px; font-size: 13px; }
            #pauseBtn  { padding: 4px 12px; font-size: 13px; }
        }

        /* ===== 全螢幕按鈕（僅手機顯示）===== */
        #fsBtn {
            display: none;
            position: fixed;
            top: 6px; right: 6px;
            z-index: 300;
            background: rgba(0,0,0,0.52);
            color: rgba(255,255,255,0.82);
            border: 1.5px solid rgba(255,255,255,0.35);
            border-radius: 6px;
            padding: 5px 10px;
            font-size: 17px;
            cursor: pointer;
            touch-action: manipulation;
            -webkit-tap-highlight-color: transparent;
        }
        @media (max-width: 860px) { #fsBtn { display: block; } }
    </style>
</head>
<body>
    <canvas id="gameCanvas" width="820" height="620"></canvas>

    <!-- 難度選擇（暫停鈕在困難鈕右方）-->
    <div id="difficultyPanel">
        <span id="diffLabel">難度：</span>
        <button class="diff-btn easy"   onclick="setDifficulty('easy')">簡單</button>
        <button class="diff-btn medium active" onclick="setDifficulty('medium')">普通</button>
        <button class="diff-btn hard"   onclick="setDifficulty('hard')">困難</button>
        <button class="diff-btn hell"   onclick="setDifficulty('hell')">地獄</button>
        <button id="pauseBtn" onclick="togglePause()">⏸ 暫停</button>
    </div>

    <div id="bottom-bar">
        <div id="controls">⬆⬇⬅➡ 移動 &nbsp;|&nbsp; 雙擊加速 &nbsp;|&nbsp; Space 射門 &nbsp;|&nbsp; ESC 暫停/繼續 &nbsp;|&nbsp; Q 返回選單</div>
        <div id="credit">Deployed by <span>Kyle Cheng</span></div>
    </div>
    <button id="fsBtn" title="全螢幕">⛶</button>


    <script>
    // =====================================================
    //   ⚽ 足球遊戲 v2
    //   操作：方向鍵移動、雙擊加速、Z 射門
    //        Space 暫停/繼續、ESC 返回選單
    // =====================================================

    const canvas = document.getElementById('gameCanvas');
    const ctx    = canvas.getContext('2d');
    const CW = canvas.width;
    const CH = canvas.height;

    // ---------- 球場尺寸 ----------
    const FIELD = {
        left: 70, right: 750, top: 90, bottom: 570,
    };
    FIELD.width   = FIELD.right  - FIELD.left;
    FIELD.height  = FIELD.bottom - FIELD.top;
    FIELD.centerX = FIELD.left + FIELD.width  / 2;
    FIELD.centerY = FIELD.top  + FIELD.height / 2;

    // ---------- 球門 ----------
    const GOAL_W = 18;
    const GOAL_H = 130;
    const GOAL_Y = FIELD.centerY - GOAL_H / 2;

    // ---------- 玩家固定常數 ----------
    const PLAYER_R  = 22;
    const BALL_R    = 10;
    const P_SPEED   = 3.2;   // 玩家正常速度
    const P_SPRINT  = 5.8;   // 玩家衝刺速度
    const SHOOT_SPD = 9.5;   // 射門速度
    const FRICTION  = 0.963; // 球的摩擦係數
    const DBL_TAP_MS    = 300; // 雙擊判定窗口（ms）
    const SPRINT_FRAMES = 75;  // 衝刺持續幀數
    const TACKLE_FRAMES = 60;  // 電腦搶球所需持續接觸幀數（60幀 ≈ 1秒）

    // =====================================================
    //   難度設定（電腦速度、衝刺冷卻）
    //   各難度速度已調降 50%
    // =====================================================
    const DIFF_SETTINGS = {
        easy: {
            label:       '簡單',
            cSpeed:      0.98,  // +30%
            cSprint:     1.69,
            coolMin:     215,   // 衝刺冷卻最短幀數（-30% → 更頻繁）
            coolMax:     370,   // 衝刺冷卻最長幀數
            shootDist:   143,   // 電腦在距左門幾 px 內射門（+30%）
            color:       '#44dd88',
        },
        medium: {
            label:       '普通',
            cSpeed:      1.43,  // +30%
            cSprint:     2.73,
            coolMin:     123,
            coolMax:     231,
            shootDist:   169,
            color:       '#ffaa22',
        },
        hard: {
            label:       '困難',
            cSpeed:      2.65,  // 原值 +20%
            cSprint:     4.84,
            coolMin:     38,
            coolMax:     90,
            shootDist:   250,
            color:       '#ff4455',
        },
        hell: {
            label:       '地獄',
            cSpeed:      3.98,  // 困難再 +50%
            cSprint:     7.26,
            coolMin:     25,
            coolMax:     60,
            shootDist:   375,
            color:       '#ff2200',
        },
    };

    // 目前難度（預設：普通）
    let currentDiff = 'medium';

    /**
     * 切換難度：更新變數並同步按鈕樣式
     */
    function setDifficulty(level) {
        currentDiff = level;
        document.querySelectorAll('.diff-btn').forEach(b => b.classList.remove('active'));
        document.querySelector(`.diff-btn.${level}`).classList.add('active');
    }

    function togglePause() {
        if (phase === 'playing') phase = 'paused';
        else if (phase === 'paused') phase = 'playing';
    }

    // =====================================================
    //   遊戲狀態
    // =====================================================
    let player   = {};
    let computer = {};
    let ball     = {};

    let playerScore   = 0;
    let computerScore = 0;

    // 遊戲階段：'start' | 'playing' | 'paused' | 'goal'
    let phase     = 'start';
    let goalTimer = 0;
    let goalMsg   = '';

    // 射門後短暫冷卻，防止立刻被自己搶到
    let stealCooldown = 0;

    // 電腦搶球計時器：電腦持續接觸玩家累積幀數，達到 TACKLE_FRAMES 才成功搶球
    let tackleTimer = 0;

    // 方向鍵狀態（updatePlayer 讀取）
    const dpadState = { up: false, down: false, left: false, right: false };

    // Canvas 射門按鈕（左下角）
    const shootBtn = { x: 80, y: CH - 82, radius: 50, pressed: false, touchId: null };

    // Canvas 圓形方向鍵（右下角）
    const cdpad = {
        active: false, touchId: null,
        cx: CW - 88, cy: CH - 82,
        R: 62, DEAD: 14,
    };

    // 遊戲計時
    const GAME_SECONDS = 60;
    let gameFrames = 0;        // 本局已計幀數
    let playerHoldFrames = 0;  // 連續持壓方向幀數（鍵盤 + D-pad 通用，用於加速）

    // =====================================================
    //   鍵盤
    // =====================================================
    const keysDown = {};
    const keyLastPressTime = {
        ArrowUp: 0, ArrowDown: 0, ArrowLeft: 0, ArrowRight: 0
    };

    window.addEventListener('keydown', e => {
        // 攔截會讓頁面捲動或焦點離開的鍵（含 Escape，防止瀏覽器搶走焦點）
        if (['ArrowUp','ArrowDown','ArrowLeft','ArrowRight','Space','Escape'].includes(e.code)) {
            e.preventDefault();
        }

        // ── ESC：暫停 / 繼續 ────────────────────────────
        if (e.code === 'Escape') {
            if (phase === 'playing') {
                phase = 'paused';
            } else if (phase === 'paused') {
                phase = 'playing';
            }
            // ESC 按下後強制把焦點拉回頁面，防止瀏覽器搶走焦點導致後續 Q 失效
            document.body.focus();
            keysDown[e.code] = true;
            return;
        }

        // ── Q：從暫停畫面回到主選單（重置比分）─────────
        if (e.code === 'KeyQ') {
            if (phase === 'paused') {
                phase         = 'start';
                playerScore   = 0;
                computerScore = 0;
                gameFrames    = 0;
                initPositions();
            }
            keysDown[e.code] = true;
            return;
        }

        // ── 遊戲結束畫面：任意鍵返回主選單 ──────────────
        if (phase === 'gameover') {
            phase = 'start'; playerScore = 0; computerScore = 0;
            gameFrames = 0; initPositions();
            return;
        }

        // ── Space：開始畫面時開始遊戲 ──────────────────
        if (e.code === 'Space') {
            if (phase === 'start') {
                phase = 'playing'; gameFrames = 0;
                keysDown[e.code] = true;
                return;
            }
        }

        // ── 開始畫面：任意（非功能）鍵開始 ────────────
        if (phase === 'start') {
            phase = 'playing'; gameFrames = 0;
            keysDown[e.code] = true;
            return;
        }

        // 以下只在 'playing' 相關狀態下有效
        if (phase !== 'playing') {
            keysDown[e.code] = true;
            return;
        }

        if (!keysDown[e.code]) {
            // ── 雙擊方向鍵 → 衝刺 ──────────────────────
            if (e.code in keyLastPressTime) {
                const now = performance.now();
                if (now - keyLastPressTime[e.code] < DBL_TAP_MS) {
                    player.sprintFrames = SPRINT_FRAMES;
                }
                keyLastPressTime[e.code] = now;
            }

            // ── Space 鍵 → 射門 ─────────────────────────
            if (e.code === 'Space' && player.hasBall && phase === 'playing') {
                doPlayerShoot();
            }
        }

        keysDown[e.code] = true;
    });

    window.addEventListener('keyup', e => {
        keysDown[e.code] = false;
    });


    // =====================================================
    //   初始化
    // =====================================================
    function initPositions() {
        const ds = DIFF_SETTINGS[currentDiff];

        player = {
            x: FIELD.left + FIELD.width * 0.22, y: FIELD.centerY,
            vx: 0, vy: 0,
            hasBall: false, sprintFrames: 0,
            facingX: 1, facingY: 0,
            color: '#3399ff',
            walkFrame: 0,
        };

        computer = {
            x: FIELD.left + FIELD.width * 0.78, y: FIELD.centerY,
            vx: 0, vy: 0,
            hasBall: false, sprintFrames: 0,
            // 初始衝刺冷卻從難度設定取得
            sprintCooldown: ds.coolMin + Math.floor(Math.random() * (ds.coolMax - ds.coolMin)),
            facingX: -1, facingY: 0,
            color: '#ff4455',
            walkFrame: 0,
        };

        stealCooldown = 0;
        tackleTimer   = 0;
        spawnBall();
    }

    function spawnBall() {
        player.hasBall   = false;
        computer.hasBall = false;
        ball = {
            x: FIELD.left + FIELD.width  * (0.30 + Math.random() * 0.40),
            y: FIELD.top  + FIELD.height * (0.20 + Math.random() * 0.60),
            vx: 0, vy: 0,
            free: true,
        };
    }

    // =====================================================
    //   玩家更新
    // =====================================================
    function updatePlayer() {
        let dx = 0, dy = 0;

        // ── 鍵盤 / D-pad 輸入 ────────────────────────
        if (keysDown['ArrowLeft']  || dpadState.left)  dx -= 1;
        if (keysDown['ArrowRight'] || dpadState.right) dx += 1;
        if (keysDown['ArrowUp']    || dpadState.up)    dy -= 1;
        if (keysDown['ArrowDown']  || dpadState.down)  dy += 1;

        // 正規化：避免對角線速度超過 1
        const inputMag = Math.sqrt(dx * dx + dy * dy);
        if (inputMag > 1) { dx /= inputMag; dy /= inputMag; }

        // ── 長壓加速（鍵盤 / D-pad 通用，最高 200%）────
        if (inputMag > 0.05) {
            playerHoldFrames = Math.min(playerHoldFrames + 1, 120);
        } else {
            playerHoldFrames = Math.max(playerHoldFrames - 4, 0); // 停止後快速衰減
        }
        // 雙擊衝刺：立即跳至最大速度
        if (player.sprintFrames > 0) {
            playerHoldFrames = 120;
            player.sprintFrames--;
        }
        const holdRatio = Math.min(playerHoldFrames / 120, 1);
        const spd = P_SPEED * (1 + holdRatio); // 3.2 px/frame → 6.4 px/frame

        player.vx = dx * spd;
        player.vy = dy * spd;

        if (inputMag > 0.05) {
            player.facingX = dx / inputMag;
            player.facingY = dy / inputMag;
        }

        player.x += player.vx;
        player.y += player.vy;
        clampToField(player);

        if (player.hasBall) carryBall(player);
    }

    function doPlayerShoot() {
        playShootSound();
        player.hasBall = false;
        ball.free = true;
        let sx = player.facingX, sy = player.facingY;
        if (sx === 0 && sy === 0) sx = 1;
        const mag = Math.sqrt(sx * sx + sy * sy);
        ball.x  = player.x + (sx / mag) * (PLAYER_R + BALL_R + 3);
        ball.y  = player.y + (sy / mag) * (PLAYER_R + BALL_R + 3);
        ball.vx = (sx / mag) * SHOOT_SPD;
        ball.vy = (sy / mag) * SHOOT_SPD;
        stealCooldown = 20;
    }

    // =====================================================
    //   電腦 AI（速度由目前難度決定）
    // =====================================================
    function updateComputer() {
        const ds = DIFF_SETTINGS[currentDiff]; // 讀取目前難度設定

        // 衝刺計時
        if (computer.sprintFrames  > 0) computer.sprintFrames--;
        if (computer.sprintCooldown > 0) computer.sprintCooldown--;
        if (computer.sprintCooldown <= 0) {
            computer.sprintFrames   = SPRINT_FRAMES;
            computer.sprintCooldown = ds.coolMin + Math.floor(Math.random() * (ds.coolMax - ds.coolMin));
        }

        const spd = (computer.sprintFrames > 0) ? ds.cSprint : ds.cSpeed;

        let targetX, targetY;

        if (computer.hasBall) {
            // 帶球往左側球門（玩家門）靠近
            targetX = FIELD.left;
            targetY = GOAL_Y + GOAL_H / 2;

            // 靠近球門時自動射門
            if (computer.x - FIELD.left < ds.shootDist) {
                doComputerShoot();
                return;
            }
        } else {
            // 無球：追球
            targetX = ball.x;
            targetY = ball.y;
        }

        const dx   = targetX - computer.x;
        const dy   = targetY - computer.y;
        const dist = Math.sqrt(dx * dx + dy * dy) || 1;

        computer.vx = (dx / dist) * spd;
        computer.vy = (dy / dist) * spd;
        computer.facingX = dx / dist;
        computer.facingY = dy / dist;

        computer.x += computer.vx;
        computer.y += computer.vy;
        clampToField(computer);

        if (computer.hasBall) carryBall(computer);
    }

    function doComputerShoot() {
        playShootSound();
        computer.hasBall = false;
        ball.free = true;
        const goalCX = FIELD.left - GOAL_W / 2;
        const goalCY = GOAL_Y + GOAL_H / 2;
        const dx     = goalCX - ball.x;
        const dy     = goalCY - ball.y;
        const dist   = Math.sqrt(dx * dx + dy * dy) || 1;
        ball.x  = computer.x + (dx / dist) * (PLAYER_R + BALL_R + 3);
        ball.y  = computer.y + (dy / dist) * (PLAYER_R + BALL_R + 3);
        ball.vx = (dx / dist) * SHOOT_SPD;
        ball.vy = (dy / dist) * SHOOT_SPD;
        stealCooldown = 20;
    }

    // =====================================================
    //   帶球 / 搶球
    // =====================================================
    function carryBall(actor) {
        ball.x = actor.x + actor.facingX * (PLAYER_R + BALL_R);
        ball.y = actor.y + actor.facingY * (PLAYER_R + BALL_R);
        ball.x = Math.max(FIELD.left + BALL_R, Math.min(FIELD.right - BALL_R, ball.x));
        ball.y = Math.max(FIELD.top  + BALL_R, Math.min(FIELD.bottom - BALL_R, ball.y));
        ball.vx = 0; ball.vy = 0;
    }

    function checkCollisions() {
        if (stealCooldown > 0) { stealCooldown--; tackleTimer = 0; return; }

        const pBall  = dist2(player.x, player.y, ball.x, ball.y);
        const cBall  = dist2(computer.x, computer.y, ball.x, ball.y);
        const pComp  = dist2(player.x, player.y, computer.x, computer.y);
        const pickR2 = (PLAYER_R + BALL_R) * (PLAYER_R + BALL_R);
        const tackR2 = (PLAYER_R * 2 - 4)  * (PLAYER_R * 2 - 4);

        if (!player.hasBall && !computer.hasBall) {
            // 無人帶球：誰先碰到球誰帶球
            tackleTimer = 0;
            if (pBall < cBall && pBall < pickR2) {
                player.hasBall = true; ball.free = false;
            } else if (cBall < pickR2) {
                computer.hasBall = true; ball.free = false;
            }

        } else if (player.hasBall) {
            // 玩家帶球：電腦需持續接觸 TACKLE_FRAMES 幀才能搶球
            if (pComp < tackR2) {
                tackleTimer++;
                if (tackleTimer >= TACKLE_FRAMES) {
                    // 持續接觸滿 1 秒，搶球成功
                    player.hasBall = false; computer.hasBall = true;
                    ball.free = false; stealCooldown = 30; tackleTimer = 0;
                }
                // 未滿 1 秒：僅累積計時，玩家仍持球
            } else {
                // 接觸中斷：重置計時器
                tackleTimer = 0;
            }

        } else if (computer.hasBall) {
            // 電腦帶球：玩家碰到電腦則立即搶球（玩家搶球仍是即時）
            tackleTimer = 0;
            if (pComp < tackR2) {
                computer.hasBall = false; player.hasBall = true;
                ball.free = false; stealCooldown = 30;
            }
        }
    }

    // =====================================================
    //   球的物理
    // =====================================================
    function updateBall() {
        if (!ball.free) return;

        ball.x += ball.vx;
        ball.y += ball.vy;
        ball.vx *= FRICTION;
        ball.vy *= FRICTION;
        if (Math.abs(ball.vx) < 0.05) ball.vx = 0;
        if (Math.abs(ball.vy) < 0.05) ball.vy = 0;

        // 上下邊界反彈
        if (ball.y - BALL_R < FIELD.top)    { ball.y = FIELD.top    + BALL_R; ball.vy =  Math.abs(ball.vy) * 0.65; }
        if (ball.y + BALL_R > FIELD.bottom) { ball.y = FIELD.bottom - BALL_R; ball.vy = -Math.abs(ball.vy) * 0.65; }

        // 左右邊界：非球門開口則反彈
        const inGoalY = ball.y > GOAL_Y && ball.y < GOAL_Y + GOAL_H;
        if (ball.x - BALL_R < FIELD.left  && !inGoalY) { ball.x = FIELD.left  + BALL_R; ball.vx =  Math.abs(ball.vx) * 0.65; }
        if (ball.x + BALL_R > FIELD.right && !inGoalY) { ball.x = FIELD.right - BALL_R; ball.vx = -Math.abs(ball.vx) * 0.65; }
    }

    // =====================================================
    //   進球判定
    // =====================================================
    function checkGoals() {
        // 右側球門（電腦門）：玩家得分
        if (ball.x - BALL_R > FIELD.right && ball.y > GOAL_Y && ball.y < GOAL_Y + GOAL_H) {
            playerScore++; triggerGoal('⚽ 玩家得分！'); return;
        }
        if (player.hasBall && player.x + PLAYER_R > FIELD.right + GOAL_W * 0.5
            && player.y > GOAL_Y && player.y < GOAL_Y + GOAL_H) {
            playerScore++; triggerGoal('⚽ 玩家得分！'); return;
        }

        // 左側球門（玩家門）：電腦得分
        if (ball.x + BALL_R < FIELD.left && ball.y > GOAL_Y && ball.y < GOAL_Y + GOAL_H) {
            computerScore++; triggerGoal('💻 電腦得分！'); return;
        }
        if (computer.hasBall && computer.x - PLAYER_R < FIELD.left - GOAL_W * 0.5
            && computer.y > GOAL_Y && computer.y < GOAL_Y + GOAL_H) {
            computerScore++; triggerGoal('💻 電腦得分！'); return;
        }
    }

    function triggerGoal(msg) {
        playGoalSound();
        phase = 'goal'; goalMsg = msg; goalTimer = 130;
    }

    // =====================================================
    //   音效系統（Web Audio API，無需外部音效檔）
    // =====================================================
    let audioCtx = null;

    // 取得（或建立）AudioContext；瀏覽器要求需有用戶互動後才能播音
    function getAudioCtx() {
        if (!audioCtx) {
            audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        }
        if (audioCtx.state === 'suspended') audioCtx.resume();
        return audioCtx;
    }

    // 射門音效：短促踢球「碰！」聲（低頻衝擊 + 噪音摩擦）
    function playShootSound() {
        try {
            const ctx = getAudioCtx();
            const now = ctx.currentTime;

            // 低頻衝擊（模擬腳踢球的悶響）
            const osc  = ctx.createOscillator();
            const gain = ctx.createGain();
            osc.connect(gain);
            gain.connect(ctx.destination);
            osc.type = 'sine';
            osc.frequency.setValueAtTime(160, now);
            osc.frequency.exponentialRampToValueAtTime(55, now + 0.10);
            gain.gain.setValueAtTime(0.7, now);
            gain.gain.exponentialRampToValueAtTime(0.001, now + 0.13);
            osc.start(now);
            osc.stop(now + 0.13);

            // 短暫白噪音（模擬球皮摩擦聲）
            const buf  = ctx.createBuffer(1, Math.floor(ctx.sampleRate * 0.06), ctx.sampleRate);
            const data = buf.getChannelData(0);
            for (let i = 0; i < data.length; i++) data[i] = Math.random() * 2 - 1;
            const noise     = ctx.createBufferSource();
            const noiseGain = ctx.createGain();
            noise.buffer = buf;
            noise.connect(noiseGain);
            noiseGain.connect(ctx.destination);
            noiseGain.gain.setValueAtTime(0.18, now);
            noiseGain.gain.exponentialRampToValueAtTime(0.001, now + 0.06);
            noise.start(now);
        } catch (e) {}
    }

    // 得分音效：上升歡慶四音（C → E → G → 高C）
    function playGoalSound() {
        try {
            const ctx   = getAudioCtx();
            const now   = ctx.currentTime;
            const notes = [523, 659, 784, 1047]; // C5 E5 G5 C6

            notes.forEach((freq, i) => {
                const osc  = ctx.createOscillator();
                const gain = ctx.createGain();
                osc.connect(gain);
                gain.connect(ctx.destination);
                osc.type          = 'triangle'; // triangle 音色較清亮
                osc.frequency.value = freq;
                const t = now + i * 0.20;
                gain.gain.setValueAtTime(0, t);
                gain.gain.linearRampToValueAtTime(0.45, t + 0.02);
                gain.gain.exponentialRampToValueAtTime(0.001, t + 0.35);
                osc.start(t);
                osc.stop(t + 0.38);
            });
        } catch (e) {}
    }

    // =====================================================
    //   工具
    // =====================================================
    function dist2(ax, ay, bx, by) {
        return (ax - bx) * (ax - bx) + (ay - by) * (ay - by);
    }
    function clampToField(actor) {
        actor.x = Math.max(FIELD.left  + PLAYER_R, Math.min(FIELD.right  - PLAYER_R, actor.x));
        actor.y = Math.max(FIELD.top   + PLAYER_R, Math.min(FIELD.bottom - PLAYER_R, actor.y));
    }
    function lightenColor(hex, amount) {
        const num = parseInt(hex.replace('#', ''), 16);
        const r   = Math.min(255, (num >> 16) + amount);
        const g   = Math.min(255, ((num >> 8) & 0xff) + amount);
        const b   = Math.min(255, (num & 0xff) + amount);
        return `rgb(${r},${g},${b})`;
    }

    // =====================================================
    //   繪圖：球場
    // =====================================================
    function drawField() {
        // 頂部 HUD 背景
        ctx.fillStyle = '#111133';
        ctx.fillRect(0, 0, CW, FIELD.top);

        // 草地條紋
        const sw = FIELD.width / 8;
        for (let i = 0; i < 8; i++) {
            ctx.fillStyle = (i % 2 === 0) ? '#2e8b2e' : '#339933';
            ctx.fillRect(FIELD.left + i * sw, FIELD.top, sw, FIELD.height);
        }

        // 場地線
        ctx.strokeStyle = 'rgba(255,255,255,0.7)';
        ctx.lineWidth   = 2;
        ctx.strokeRect(FIELD.left, FIELD.top, FIELD.width, FIELD.height);
        // 中線
        ctx.beginPath(); ctx.moveTo(FIELD.centerX, FIELD.top); ctx.lineTo(FIELD.centerX, FIELD.bottom); ctx.stroke();
        // 中圈
        ctx.beginPath(); ctx.arc(FIELD.centerX, FIELD.centerY, 65, 0, Math.PI * 2); ctx.stroke();
        // 中心點
        ctx.fillStyle = 'white'; ctx.beginPath(); ctx.arc(FIELD.centerX, FIELD.centerY, 4, 0, Math.PI * 2); ctx.fill();

        // 禁區
        ctx.strokeStyle = 'rgba(255,255,255,0.45)'; ctx.lineWidth = 1.5;
        const bw = 85, bh = GOAL_H + 70, by = FIELD.centerY - bh / 2;
        ctx.strokeRect(FIELD.left,         by, bw,  bh);
        ctx.strokeRect(FIELD.right - bw,   by, bw,  bh);

        // 角球弧
        const corners = [
            [FIELD.left, FIELD.top, 0, Math.PI/2],
            [FIELD.right, FIELD.top, Math.PI/2, Math.PI],
            [FIELD.right, FIELD.bottom, Math.PI, Math.PI*1.5],
            [FIELD.left, FIELD.bottom, Math.PI*1.5, Math.PI*2],
        ];
        corners.forEach(([cx, cy, a1, a2]) => {
            ctx.beginPath(); ctx.arc(cx, cy, 18, a1, a2); ctx.stroke();
        });
    }

    // =====================================================
    //   繪圖：球門
    // =====================================================
    function drawGoals() {
        // 左側球門（玩家門）
        ctx.fillStyle = 'rgba(100,100,120,0.7)';
        ctx.fillRect(FIELD.left - GOAL_W, GOAL_Y, GOAL_W, GOAL_H);
        ctx.strokeStyle = 'white'; ctx.lineWidth = 2;
        ctx.strokeRect(FIELD.left - GOAL_W, GOAL_Y, GOAL_W, GOAL_H);
        ctx.font = 'bold 11px Arial'; ctx.textAlign = 'center';
        ctx.fillStyle = '#aac';
        ctx.fillText('玩家門', FIELD.left - GOAL_W / 2, GOAL_Y - 6);

        // 右側球門（電腦門）
        ctx.fillStyle = 'rgba(100,100,120,0.7)';
        ctx.fillRect(FIELD.right, GOAL_Y, GOAL_W, GOAL_H);
        ctx.strokeStyle = 'white';
        ctx.strokeRect(FIELD.right, GOAL_Y, GOAL_W, GOAL_H);
        ctx.fillStyle = '#aac';
        ctx.fillText('電腦門', FIELD.right + GOAL_W / 2, GOAL_Y - 6);
    }

    // =====================================================
    //   繪圖：足球
    // =====================================================
    function drawBall() {
        const x = ball.x, y = ball.y;
        // 陰影
        ctx.beginPath(); ctx.ellipse(x, y + BALL_R + 2, BALL_R * 0.8, BALL_R * 0.3, 0, 0, Math.PI * 2);
        ctx.fillStyle = 'rgba(0,0,0,0.3)'; ctx.fill();
        // 白色球體
        ctx.beginPath(); ctx.arc(x, y, BALL_R, 0, Math.PI * 2);
        ctx.fillStyle = 'white'; ctx.fill();
        ctx.strokeStyle = '#222'; ctx.lineWidth = 1; ctx.stroke();
        // 黑色中心
        ctx.beginPath(); ctx.arc(x, y, BALL_R * 0.42, 0, Math.PI * 2);
        ctx.fillStyle = '#1a1a1a'; ctx.fill();
        // 五個花紋點
        for (let i = 0; i < 5; i++) {
            const a = (i / 5) * Math.PI * 2 - Math.PI / 2;
            ctx.beginPath(); ctx.arc(x + Math.cos(a) * BALL_R * 0.7, y + Math.sin(a) * BALL_R * 0.7, BALL_R * 0.18, 0, Math.PI * 2);
            ctx.fillStyle = '#1a1a1a'; ctx.fill();
        }
        // 高光
        ctx.beginPath(); ctx.arc(x - BALL_R * 0.3, y - BALL_R * 0.32, BALL_R * 0.28, 0, Math.PI * 2);
        ctx.fillStyle = 'rgba(255,255,255,0.65)'; ctx.fill();
    }

    // =====================================================
    //   繪圖：球員
    // =====================================================
    function drawActor(actor, label) {
        const x = actor.x, y = actor.y;
        const isP1     = label === 'P1';
        const isMoving = Math.abs(actor.vx) > 0.1 || Math.abs(actor.vy) > 0.1;

        // 行走幀計數
        if (isMoving) actor.walkFrame = (actor.walkFrame || 0) + 1;
        else          actor.walkFrame = 0;
        const phase = Math.sin((actor.walkFrame || 0) * 0.28);

        const jerseyCol = isP1 ? '#2277ee' : '#cc3344';
        const shortCol  = isP1 ? '#112266' : '#660011';
        const skinCol   = '#f5c89a';

        // ── 速度光暈 ────────────────────────────────
        const glowOn = isP1 ? playerHoldFrames > 20 : actor.sprintFrames > 0;
        if (glowOn) {
            ctx.beginPath(); ctx.arc(x, y - 4, PLAYER_R + 6, 0, Math.PI * 2);
            const glowG = isP1 ? Math.max(80, Math.round(210 - playerHoldFrames)) : 210;
            ctx.strokeStyle = `rgba(255,${glowG},0,0.55)`;
            ctx.lineWidth = 4; ctx.stroke();
        }
        // 帶球光圈
        if (actor.hasBall) {
            ctx.beginPath(); ctx.arc(x, y - 4, PLAYER_R + 8, 0, Math.PI * 2);
            ctx.strokeStyle = 'rgba(255,230,50,0.75)'; ctx.lineWidth = 2.5; ctx.stroke();
        }

        // ── 地面陰影 ────────────────────────────────
        ctx.beginPath();
        ctx.ellipse(x, y + 17, 12, 4, 0, 0, Math.PI * 2);
        ctx.fillStyle = 'rgba(0,0,0,0.22)'; ctx.fill();

        // ── 雙腳（左右反相擺動）────────────────────
        ctx.lineCap = 'round';
        const lx2 = x - 4 + phase * 5,  ly2 = y + 16;
        const rx2 = x + 4 - phase * 5,  ry2 = y + 16;
        // 左腳
        ctx.beginPath(); ctx.moveTo(x - 4, y + 2); ctx.lineTo(lx2, ly2);
        ctx.strokeStyle = shortCol; ctx.lineWidth = 5; ctx.stroke();
        ctx.beginPath(); ctx.arc(lx2, ly2, 3.5, 0, Math.PI * 2);
        ctx.fillStyle = '#3a2a18'; ctx.fill();
        // 右腳
        ctx.beginPath(); ctx.moveTo(x + 4, y + 2); ctx.lineTo(rx2, ry2);
        ctx.strokeStyle = shortCol; ctx.lineWidth = 5; ctx.stroke();
        ctx.beginPath(); ctx.arc(rx2, ry2, 3.5, 0, Math.PI * 2);
        ctx.fillStyle = '#3a2a18'; ctx.fill();

        // ── 球褲 ────────────────────────────────────
        ctx.beginPath(); ctx.roundRect(x - 7, y - 2, 14, 8, 2);
        ctx.fillStyle = shortCol; ctx.fill();

        // ── 球衣 / 軀幹 ─────────────────────────────
        ctx.beginPath(); ctx.roundRect(x - 8, y - 14, 16, 14, 4);
        ctx.fillStyle = jerseyCol; ctx.fill();
        if (actor.hasBall) {
            ctx.strokeStyle = '#ffe040'; ctx.lineWidth = 2; ctx.stroke();
        }
        // 球衣亮面
        ctx.beginPath(); ctx.roundRect(x - 5, y - 12, 10, 6, 2);
        ctx.fillStyle = 'rgba(255,255,255,0.15)'; ctx.fill();

        // ── 雙臂（與腳反相）────────────────────────
        const arm = -phase;
        ctx.strokeStyle = jerseyCol; ctx.lineWidth = 4;
        ctx.beginPath(); ctx.moveTo(x - 8, y - 10); ctx.lineTo(x - 14, y - 3 + arm * 6); ctx.stroke();
        ctx.beginPath(); ctx.moveTo(x + 8, y - 10); ctx.lineTo(x + 14, y - 3 - arm * 6); ctx.stroke();

        // ── 頭部 ────────────────────────────────────
        ctx.beginPath(); ctx.arc(x, y - 20, 7, 0, Math.PI * 2);
        ctx.fillStyle = skinCol; ctx.fill();
        ctx.strokeStyle = actor.hasBall ? '#ffe040' : 'rgba(0,0,0,0.22)';
        ctx.lineWidth = actor.hasBall ? 2 : 1; ctx.stroke();

        // ── 頭髮 ────────────────────────────────────
        const hairCol = isP1 ? '#2a1505' : '#0d0820';
        ctx.fillStyle = hairCol;
        // 髮帽基底（頭頂半弧）
        ctx.beginPath();
        ctx.arc(x, y - 21, 8, Math.PI, 0, true);
        ctx.lineTo(x + 8, y - 18);
        ctx.lineTo(x - 8, y - 18);
        ctx.closePath();
        ctx.fill();
        // 三支髮尖
        ctx.beginPath(); ctx.moveTo(x - 2.5, y - 27); ctx.lineTo(x, y - 34); ctx.lineTo(x + 2.5, y - 27); ctx.closePath(); ctx.fill();
        ctx.beginPath(); ctx.moveTo(x - 7, y - 25); ctx.lineTo(x - 10, y - 31); ctx.lineTo(x - 4, y - 25); ctx.closePath(); ctx.fill();
        ctx.beginPath(); ctx.moveTo(x + 4, y - 25); ctx.lineTo(x + 10, y - 31); ctx.lineTo(x + 7, y - 25); ctx.closePath(); ctx.fill();
        // 髮絲光澤
        ctx.strokeStyle = isP1 ? 'rgba(180,110,50,0.45)' : 'rgba(100,80,200,0.40)';
        ctx.lineWidth = 1;
        ctx.beginPath(); ctx.arc(x - 2, y - 23, 4, -Math.PI * 0.85, -Math.PI * 0.25, false); ctx.stroke();

        // ── 眼睛（朝向方向）────────────────────────
        const ex = x + actor.facingX * 4;
        const ey = y - 20 + actor.facingY * 4;
        ctx.beginPath(); ctx.arc(ex, ey, 2.5, 0, Math.PI * 2);
        ctx.fillStyle = '#1a1a1a'; ctx.fill();

        // ── 標籤 ────────────────────────────────────
        ctx.font = 'bold 9px Arial'; ctx.textAlign = 'center';
        ctx.fillStyle = 'rgba(255,255,255,0.9)';
        ctx.fillText(label, x, y - 5);

        ctx.lineCap = 'butt'; ctx.lineWidth = 1;
    }

    // =====================================================
    //   繪圖：電腦搶球進度圈
    //   當電腦正在搶球時，在玩家外側顯示紅色弧形進度條
    // =====================================================
    function drawTackleIndicator() {
        if (tackleTimer <= 0) return;

        const progress = tackleTimer / TACKLE_FRAMES; // 0.0 ~ 1.0
        const radius   = PLAYER_R + 11;
        const startA   = -Math.PI / 2;                // 從頂部開始順時針
        const endA     = startA + progress * Math.PI * 2;

        // 灰色底圈（背景軌道）
        ctx.beginPath();
        ctx.arc(player.x, player.y, radius, 0, Math.PI * 2);
        ctx.strokeStyle = 'rgba(255,255,255,0.15)';
        ctx.lineWidth   = 4;
        ctx.stroke();

        // 紅色進度弧（隨時間填滿）
        // 顏色從橘黃漸變到紅，快滿時閃爍
        const flash = (progress > 0.8) && (Math.floor(performance.now() / 120) % 2 === 0);
        ctx.beginPath();
        ctx.arc(player.x, player.y, radius, startA, endA);
        ctx.strokeStyle = flash ? '#ffffff' : `hsl(${30 - progress * 30}, 100%, 55%)`;
        ctx.lineWidth   = 4;
        ctx.lineCap     = 'round';
        ctx.stroke();
        ctx.lineCap = 'butt';

        // 進度百分比文字（顯示在進度圈旁邊）
        ctx.font      = 'bold 11px Arial';
        ctx.textAlign = 'center';
        ctx.fillStyle = flash ? 'white' : '#ffaa44';
        ctx.fillText('搶球 ' + Math.ceil(progress * 100) + '%', player.x, player.y - radius - 6);
    }

    // =====================================================
    //   繪圖：HUD（比分 + 難度 + 提示）
    // =====================================================
    function drawHUD() {
        const ds = DIFF_SETTINGS[currentDiff];

        // 頂部背景
        ctx.fillStyle = '#111133';
        ctx.fillRect(0, 0, CW, FIELD.top - 2);

        // ── 倒數計時（HUD 左側）────────────────────────
        const secsLeft = Math.max(0, Math.ceil((GAME_SECONDS * 60 - gameFrames) / 60));
        const tmm = String(Math.floor(secsLeft / 60));
        const tss = String(secsLeft % 60).padStart(2, '0');
        const timeBlk = secsLeft <= 10 && Math.floor(performance.now() / 250) % 2 === 0;
        ctx.font = 'bold 26px Arial'; ctx.textAlign = 'left';
        ctx.fillStyle = secsLeft <= 10 ? (timeBlk ? '#ff2233' : '#ff8800') : 'white';
        ctx.fillText(`${tmm}:${tss}`, 56, 52);
        ctx.font = '10px Arial'; ctx.fillStyle = '#667';
        ctx.fillText('倒數', 56, 68);

        // 玩家標籤
        ctx.font = 'bold 22px Arial'; ctx.textAlign = 'right';
        ctx.fillStyle = '#4499ff'; ctx.fillText('玩家', CW / 2 - 55, 48);

        // 比分
        ctx.font = 'bold 30px Arial'; ctx.textAlign = 'center';
        ctx.fillStyle = 'white'; ctx.fillText(playerScore + '  :  ' + computerScore, CW / 2, 52);

        // 電腦標籤
        ctx.font = 'bold 22px Arial'; ctx.textAlign = 'left';
        ctx.fillStyle = '#ff4455'; ctx.fillText('電腦', CW / 2 + 55, 48);

        // 難度標示（右上角）
        ctx.font = 'bold 13px Arial'; ctx.textAlign = 'right';
        ctx.fillStyle = ds.color;
        ctx.fillText('難度：' + ds.label, CW - 10, 20);

        // 提示文字
        ctx.font = '11px Arial'; ctx.textAlign = 'center';
        ctx.fillStyle = '#556';
        ctx.fillText('ESC 暫停  Q 返回選單', CW / 2, 72);

        // 速度指示器
        if (playerHoldFrames > 0) {
            const ratio = playerHoldFrames / 120;
            const pct   = Math.round(100 + ratio * 100);
            ctx.font = 'bold 13px Arial'; ctx.textAlign = 'left';
            ctx.fillStyle = ratio >= 1 ? '#ff8800' : '#ffe040';
            ctx.fillText(`⚡ ${pct}%`, FIELD.left, FIELD.top + 20);
        }

        // 帶球提示
        if (player.hasBall) {
            ctx.font = 'bold 13px Arial'; ctx.textAlign = 'right';
            ctx.fillStyle = '#ffe040'; ctx.fillText('帶球中 ⚽ Space / 射門鈕', FIELD.right, FIELD.top + 20);
        }

        // 浮水印（遊戲右下角，半透明不干擾遊玩）
        ctx.font = '11px Arial'; ctx.textAlign = 'right';
        ctx.fillStyle = 'rgba(180, 200, 230, 0.35)';
        ctx.fillText('Deployed by Kyle Cheng', FIELD.right, FIELD.bottom - 6);
    }

    // =====================================================
    //   繪圖：開始選單
    // =====================================================
    function drawStartScreen() {
        ctx.fillStyle = 'rgba(0,0,0,0.74)'; ctx.fillRect(0, 0, CW, CH);

        // 標題
        ctx.textAlign = 'center';
        ctx.font = 'bold 62px Arial';
        ctx.fillStyle = '#ffe040';
        ctx.shadowColor = 'rgba(255,200,0,0.5)'; ctx.shadowBlur = 24;
        ctx.fillText('⚽ 足球遊戲', CW / 2, CH / 2 - 80);
        ctx.shadowBlur = 0;

        // 操作說明方框
        ctx.beginPath();
        ctx.roundRect(CW / 2 - 230, CH / 2 - 40, 460, 145, 12);
        ctx.fillStyle = 'rgba(255,255,255,0.05)'; ctx.fill();
        ctx.strokeStyle = '#334'; ctx.lineWidth = 1.5; ctx.stroke();

        // 鍵盤說明
        ctx.font = '17px Arial'; ctx.fillStyle = '#bbc';
        const lines = [
            '⬆⬇⬅➡  移動　　雙擊同方向鍵  衝刺加速',
            'Space  射門（帶球時）',
            'ESC  暫停 / 繼續　　Q  返回此選單',
        ];
        lines.forEach((t, i) => ctx.fillText(t, CW / 2, CH / 2 - 8 + i * 32));

        // 分隔線
        ctx.strokeStyle = 'rgba(255,255,255,0.10)'; ctx.lineWidth = 1;
        ctx.beginPath(); ctx.moveTo(CW/2 - 175, CH/2 + 95); ctx.lineTo(CW/2 + 175, CH/2 + 95); ctx.stroke();

        // 手機操作說明
        ctx.font = 'bold 13px Arial'; ctx.fillStyle = '#6699cc';
        ctx.fillText('📱 手機操作', CW / 2, CH / 2 + 115);
        ctx.font = '14px Arial'; ctx.fillStyle = '#7799bb';
        ctx.fillText('左下方 射門按鈕　｜　右下方 ▲▼◀▶ 移動球員', CW / 2, CH / 2 + 136);

        // 難度提示
        const ds = DIFF_SETTINGS[currentDiff];
        ctx.font = '15px Arial'; ctx.fillStyle = ds.color;
        ctx.fillText('目前難度：' + ds.label + '（可在畫面下方切換）', CW / 2, CH / 2 + 162);

        // 開始提示（閃爍效果）
        const blink = Math.floor(performance.now() / 500) % 2 === 0;
        if (blink) {
            ctx.font = 'bold 24px Arial'; ctx.fillStyle = '#44ff88';
            ctx.fillText('按任意鍵 / 點畫面 開始遊戲', CW / 2, CH / 2 + 196);
        }

        // 署名（開始畫面右下角）
        ctx.font = '13px Arial'; ctx.textAlign = 'right';
        ctx.fillStyle = 'rgba(150, 180, 220, 0.75)';
        ctx.fillText('Deployed by Kyle Cheng', CW - 14, CH - 14);
    }

    // =====================================================
    //   繪圖：Canvas 內觸控控制介面
    //   射門按鈕（左下）+ 圓形方向鍵（右下）
    // =====================================================

    /** 繪製方向三角形（四向風格一致，取代 Unicode 字符） */
    function drawTriangle(x, y, dir, size, color) {
        ctx.beginPath();
        switch (dir) {
            case 'up':
                ctx.moveTo(x,              y - size);
                ctx.lineTo(x + size * 0.78, y + size * 0.52);
                ctx.lineTo(x - size * 0.78, y + size * 0.52);
                break;
            case 'down':
                ctx.moveTo(x,              y + size);
                ctx.lineTo(x + size * 0.78, y - size * 0.52);
                ctx.lineTo(x - size * 0.78, y - size * 0.52);
                break;
            case 'left':
                ctx.moveTo(x - size,        y);
                ctx.lineTo(x + size * 0.52, y - size * 0.78);
                ctx.lineTo(x + size * 0.52, y + size * 0.78);
                break;
            case 'right':
                ctx.moveTo(x + size,        y);
                ctx.lineTo(x - size * 0.52, y - size * 0.78);
                ctx.lineTo(x - size * 0.52, y + size * 0.78);
                break;
        }
        ctx.closePath();
        ctx.fillStyle = color;
        ctx.fill();
    }

    function drawMobileControls() {
        // ── 射門按鈕 ──────────────────────────────────────
        const sb = shootBtn;
        ctx.beginPath();
        ctx.arc(sb.x, sb.y, sb.radius, 0, Math.PI * 2);
        ctx.fillStyle = sb.pressed ? 'rgba(255,68,28,0.88)' : 'rgba(195,42,18,0.45)';
        ctx.fill();
        ctx.strokeStyle = sb.pressed ? 'rgba(255,158,130,0.95)' : 'rgba(255,98,72,0.52)';
        ctx.lineWidth = 2.5; ctx.stroke();
        ctx.font = `bold ${sb.pressed ? 15 : 13}px Arial`;
        ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
        ctx.fillStyle = sb.pressed ? 'white' : 'rgba(255,208,198,0.80)';
        ctx.fillText('射門', sb.x, sb.y);
        ctx.textBaseline = 'alphabetic';

        // ── 圓形方向鍵 ────────────────────────────────────
        const { cx, cy, R, DEAD } = cdpad;

        // 外圈背景
        ctx.beginPath();
        ctx.arc(cx, cy, R, 0, Math.PI * 2);
        ctx.fillStyle = 'rgba(26,50,105,0.50)';
        ctx.fill();
        ctx.strokeStyle = 'rgba(72,122,205,0.52)';
        ctx.lineWidth = 1.5; ctx.stroke();

        // 十字分割線
        ctx.strokeStyle = 'rgba(95,148,218,0.20)';
        ctx.lineWidth = 1;
        ctx.beginPath();
        ctx.moveTo(cx - R, cy); ctx.lineTo(cx + R, cy);
        ctx.moveTo(cx, cy - R); ctx.lineTo(cx, cy + R);
        ctx.stroke();

        // 四個方向箭頭（自繪三角形，四向風格一致）
        const ad = R * 0.58;
        [
            [cx,      cy - ad, 'up',    dpadState.up],
            [cx,      cy + ad, 'down',  dpadState.down],
            [cx - ad, cy,      'left',  dpadState.left],
            [cx + ad, cy,      'right', dpadState.right],
        ].forEach(([ax, ay, dir, active]) => {
            drawTriangle(ax, ay, dir, 9, active ? 'rgba(255,65,40,0.95)' : 'rgba(155,198,255,0.38)');
        });

        // 中心死區標示
        ctx.beginPath();
        ctx.arc(cx, cy, DEAD, 0, Math.PI * 2);
        ctx.fillStyle = 'rgba(55,98,168,0.42)';
        ctx.fill();

        ctx.textBaseline = 'alphabetic';
    }

    // =====================================================
    //   繪圖：回主選單按鈕（覆蓋在所有層之上）
    // =====================================================
    function drawMenuBtn() {
        const mbx = 28, mby = 38, mbr = 22;
        ctx.beginPath(); ctx.arc(mbx, mby, mbr, 0, Math.PI * 2);
        ctx.fillStyle = 'rgba(38, 55, 110, 0.60)';
        ctx.fill();
        ctx.strokeStyle = 'rgba(90, 128, 200, 0.60)';
        ctx.lineWidth = 1.5; ctx.stroke();
        ctx.font = 'bold 18px Arial';
        ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
        ctx.fillStyle = 'rgba(165, 200, 240, 0.88)';
        ctx.fillText('←', mbx, mby);
        ctx.textBaseline = 'alphabetic';
    }

    // =====================================================
    //   繪圖：遊戲結束畫面（時間到）
    // =====================================================
    function drawGameOverScreen() {
        ctx.fillStyle = 'rgba(0,0,0,0.82)';
        ctx.fillRect(0, 0, CW, CH);

        const pWin = playerScore > computerScore;
        const tied = playerScore === computerScore;

        // 獎盃
        ctx.font = '76px Arial'; ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
        ctx.fillText('🏆', CW / 2, CH / 2 - 118);
        ctx.textBaseline = 'alphabetic';

        // 遊戲結束標題
        ctx.font = 'bold 30px Arial'; ctx.fillStyle = '#aab';
        ctx.fillText('⏱ 遊戲結束', CW / 2, CH / 2 - 52);

        // 勝方公告
        const winText  = tied ? '平局！' : pWin ? '🎉 玩家獲勝！' : '💻 電腦獲勝！';
        const winColor = tied ? '#aaa'  : pWin ? '#44ff88' : '#ff5566';
        ctx.font = 'bold 50px Arial'; ctx.fillStyle = winColor;
        ctx.shadowColor = 'rgba(0,0,0,0.8)'; ctx.shadowBlur = 14;
        ctx.fillText(winText, CW / 2, CH / 2 + 14);
        ctx.shadowBlur = 0;

        // 最終比分（雙色）
        ctx.font = 'bold 58px Arial';
        ctx.textAlign = 'right';  ctx.fillStyle = '#4499ff';
        ctx.fillText(playerScore,   CW / 2 - 22, CH / 2 + 76);
        ctx.textAlign = 'center'; ctx.fillStyle = 'rgba(255,255,255,0.45)';
        ctx.fillText(':',            CW / 2,      CH / 2 + 76);
        ctx.textAlign = 'left';   ctx.fillStyle = '#ff4455';
        ctx.fillText(computerScore,  CW / 2 + 22, CH / 2 + 76);
        ctx.font = '15px Arial';
        ctx.textAlign = 'right';  ctx.fillStyle = '#5599ff';
        ctx.fillText('玩家',         CW / 2 - 28, CH / 2 + 100);
        ctx.textAlign = 'left';   ctx.fillStyle = '#ff6677';
        ctx.fillText('電腦',         CW / 2 + 28, CH / 2 + 100);

        // 返回提示（閃爍）
        const blink = Math.floor(performance.now() / 500) % 2 === 0;
        if (blink) {
            ctx.font = 'bold 20px Arial'; ctx.fillStyle = '#44ff88';
            ctx.fillText('點擊畫面 或 按任意鍵 返回主選單', CW / 2, CH / 2 + 144);
        }

        // 署名
        ctx.font = '12px Arial'; ctx.textAlign = 'right';
        ctx.fillStyle = 'rgba(150, 180, 220, 0.65)';
        ctx.fillText('Deployed by Kyle Cheng', CW - 14, CH - 12);
    }

    // =====================================================
    //   主繪圖函式
    // =====================================================
    function draw() {
        ctx.clearRect(0, 0, CW, CH);
        drawField();
        drawGoals();
        drawBall();
        drawActor(computer, 'AI');  // 電腦先畫（玩家在上層）
        drawActor(player, 'P1');
        drawTackleIndicator();      // 搶球倒數進度圈（在球員上層）
        if (phase === 'playing') drawMobileControls(); // 觸控控制介面
        drawHUD();

        // 各狀態的覆蓋層
        if (phase === 'goal')     drawGoalScreen();
        if (phase === 'paused')   drawPauseScreen();
        if (phase === 'start')    drawStartScreen();
        if (phase === 'gameover') drawGameOverScreen();

        // 回主選單按鈕：疊在所有層之上（進行中 / 暫停 / 進球 均可見）
        if (phase !== 'start' && phase !== 'gameover') drawMenuBtn();
    }

    // =====================================================
    //   主更新函式
    // =====================================================
    function update() {
        // 暫停、開始選單、遊戲結束 → 跳過遊戲邏輯
        if (phase === 'start' || phase === 'paused' || phase === 'gameover') return;

        if (phase === 'goal') {
            goalTimer--;
            if (goalTimer <= 0) {
                // 進球動畫結束後才判斷時間是否已到
                if (gameFrames >= GAME_SECONDS * 60) {
                    phase = 'gameover';
                } else {
                    phase = 'playing';
                    initPositions();
                }
            }
            return;
        }

        // 倒數計時
        gameFrames++;
        if (gameFrames >= GAME_SECONDS * 60) {
            phase = 'gameover';
            return;
        }

        // 正常遊戲更新
        updatePlayer();
        updateComputer();
        checkCollisions();
        updateBall();
        checkGoals();
    }

    // =====================================================
    //   主迴圈 + 啟動
    // =====================================================
    function gameLoop() {
        update();
        draw();
        requestAnimationFrame(gameLoop);
    }

    // 點擊 canvas 時把焦點拉回 document，確保鍵盤事件正常觸發
    canvas.addEventListener('click', () => canvas.focus());
    canvas.setAttribute('tabindex', '0');
    canvas.focus();

    // =====================================================
    //   觸控輸入（手機 / 平板）
    //   射門按鈕（左下）＋ 圓形方向鍵（右下），均繪製於 Canvas
    // =====================================================

    /** 螢幕座標 → Canvas 內部座標（處理 CSS 縮放） */
    function getTouchPos(touch) {
        const rect = canvas.getBoundingClientRect();
        return {
            x: (touch.clientX - rect.left) * (CW / rect.width),
            y: (touch.clientY - rect.top)  * (CH / rect.height),
        };
    }

    /** 依觸碰位置更新 dpadState（支援斜向：兩方向同時激活）*/
    function updateCdpadDir(tx, ty) {
        const dx = tx - cdpad.cx, dy = ty - cdpad.cy;
        const dist = Math.sqrt(dx * dx + dy * dy);
        dpadState.up = dpadState.down = dpadState.left = dpadState.right = false;
        if (dist < cdpad.DEAD) return;
        const adx = Math.abs(dx), ady = Math.abs(dy);
        if (dx > 0 && adx > ady * 0.38) dpadState.right = true;
        if (dx < 0 && adx > ady * 0.38) dpadState.left  = true;
        if (dy < 0 && ady > adx * 0.38) dpadState.up    = true;
        if (dy > 0 && ady > adx * 0.38) dpadState.down  = true;
    }

    canvas.addEventListener('touchstart', e => {
        e.preventDefault();

        // 遊戲結束：點任何地方返回主選單
        if (phase === 'gameover') {
            phase = 'start'; playerScore = 0; computerScore = 0;
            gameFrames = 0; initPositions(); return;
        }

        // 開始畫面：點任何地方開始遊戲
        if (phase === 'start') { phase = 'playing'; gameFrames = 0; return; }

        Array.from(e.changedTouches).forEach(t => {
            const p = getTouchPos(t);

            // 回主選單按鈕（左上角，任何狀態優先）
            const mbdx = p.x - 28, mbdy = p.y - 38;
            if (mbdx * mbdx + mbdy * mbdy < 484) { // r=22, r²=484
                phase = 'start'; playerScore = 0; computerScore = 0;
                gameFrames = 0; initPositions(); return;
            }

            // 暫停中：點非選單區繼續遊戲
            if (phase === 'paused') { phase = 'playing'; return; }

            // 射門按鈕（左下）
            const sdx = p.x - shootBtn.x, sdy = p.y - shootBtn.y;
            if (sdx*sdx + sdy*sdy < shootBtn.radius * shootBtn.radius) {
                shootBtn.pressed = true; shootBtn.touchId = t.identifier;
                if (player.hasBall && phase === 'playing') doPlayerShoot();
                return;
            }

            // 圓形方向鍵（右下）
            const cdx = p.x - cdpad.cx, cdy = p.y - cdpad.cy;
            if (cdx*cdx + cdy*cdy < cdpad.R * cdpad.R && !cdpad.active) {
                cdpad.active = true; cdpad.touchId = t.identifier;
                updateCdpadDir(p.x, p.y);
            }
        });
    }, { passive: false });

    canvas.addEventListener('touchmove', e => {
        e.preventDefault();
        Array.from(e.changedTouches).forEach(t => {
            if (t.identifier === cdpad.touchId) {
                updateCdpadDir(getTouchPos(t).x, getTouchPos(t).y);
            }
        });
    }, { passive: false });

    canvas.addEventListener('touchend', e => {
        e.preventDefault();
        Array.from(e.changedTouches).forEach(t => {
            if (t.identifier === shootBtn.touchId) {
                shootBtn.pressed = false; shootBtn.touchId = null;
            }
            if (t.identifier === cdpad.touchId) {
                cdpad.active = false; cdpad.touchId = null;
                dpadState.up = dpadState.down = dpadState.left = dpadState.right = false;
            }
        });
    }, { passive: false });

    canvas.addEventListener('touchcancel', () => {
        shootBtn.pressed = false; shootBtn.touchId = null;
        cdpad.active = false; cdpad.touchId = null;
        dpadState.up = dpadState.down = dpadState.left = dpadState.right = false;
    }, { passive: false });

    // =====================================================
    //   全螢幕控制
    // =====================================================
    function toggleFullscreen() {
        const el = document.documentElement;
        if (!document.fullscreenElement && !document.webkitFullscreenElement) {
            (el.requestFullscreen || el.webkitRequestFullscreen)?.call(el).catch(() => {});
        } else {
            (document.exitFullscreen || document.webkitExitFullscreen)?.call(document);
        }
    }
    document.getElementById('fsBtn').addEventListener('click', toggleFullscreen);

    // 橫屏時自動嘗試全螢幕（Android Chrome 支援；iOS Safari 不支援但不會報錯）
    window.addEventListener('orientationchange', () => {
        setTimeout(() => {
            if (window.innerWidth > window.innerHeight && !document.fullscreenElement) {
                document.documentElement.requestFullscreen?.().catch(() => {});
            }
        }, 400);
    });

    initPositions();
    gameLoop();
    </script>
</body>
</html>
