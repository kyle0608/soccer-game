    // =====================================================
    //   橫屏側邊控制 canvas（射門左下 / 方向鍵右下）
    // =====================================================
    const shootCvs = document.getElementById('shootCvs');
    const dpadCvs  = document.getElementById('dpadCvs');
    const sctx = shootCvs.getContext('2d');
    const dctx = dpadCvs.getContext('2d');

    function isLandscapeMobile() {
        return window.innerWidth > window.innerHeight && window.innerWidth < 1100;
    }

    // drawTriangle 只用 main ctx；這裡提供帶 ctx 參數版給側邊 canvas 用
    function drawTriangleEx(c, x, y, dir, size, color) {
        c.beginPath();
        switch (dir) {
            case 'up':    c.moveTo(x, y-size); c.lineTo(x+size*0.78, y+size*0.52); c.lineTo(x-size*0.78, y+size*0.52); break;
            case 'down':  c.moveTo(x, y+size); c.lineTo(x+size*0.78, y-size*0.52); c.lineTo(x-size*0.78, y-size*0.52); break;
            case 'left':  c.moveTo(x-size, y); c.lineTo(x+size*0.52, y-size*0.78); c.lineTo(x+size*0.52, y+size*0.78); break;
            case 'right': c.moveTo(x+size, y); c.lineTo(x-size*0.52, y-size*0.78); c.lineTo(x-size*0.52, y+size*0.78); break;
        }
        c.closePath(); c.fillStyle = color; c.fill();
    }

    function drawShootCvs() {
        const W = shootCvs.width, H = shootCvs.height;
        sctx.clearRect(0, 0, W, H);
        const r = W * 0.44;
        sctx.beginPath(); sctx.arc(W/2, H/2, r, 0, Math.PI*2);
        sctx.fillStyle = shootBtn.pressed ? 'rgba(255,68,28,0.88)' : 'rgba(195,42,18,0.45)';
        sctx.fill();
        sctx.strokeStyle = shootBtn.pressed ? 'rgba(255,158,130,0.95)' : 'rgba(255,98,72,0.52)';
        sctx.lineWidth = 2.5; sctx.stroke();
        sctx.font = `bold ${shootBtn.pressed ? 16 : 14}px Arial`;
        sctx.textAlign = 'center'; sctx.textBaseline = 'middle';
        sctx.fillStyle = shootBtn.pressed ? 'white' : 'rgba(255,208,198,0.80)';
        sctx.fillText('射門', W/2, H/2);
        sctx.textBaseline = 'alphabetic';
    }

    function drawDpadCvs() {
        const W = dpadCvs.width, H = dpadCvs.height;
        const cx = W/2, cy = H/2, R = Math.min(W,H) * 0.44;
        dctx.clearRect(0, 0, W, H);
        dctx.beginPath(); dctx.arc(cx, cy, R, 0, Math.PI*2);
        dctx.fillStyle = 'rgba(26,50,105,0.50)'; dctx.fill();
        dctx.strokeStyle = 'rgba(72,122,205,0.52)'; dctx.lineWidth = 1.5; dctx.stroke();
        dctx.strokeStyle = 'rgba(95,148,218,0.20)'; dctx.lineWidth = 1;
        dctx.beginPath();
        dctx.moveTo(cx-R, cy); dctx.lineTo(cx+R, cy);
        dctx.moveTo(cx, cy-R); dctx.lineTo(cx, cy+R);
        dctx.stroke();
        const ad = R * 0.58, triSz = Math.max(6, Math.round(R * 0.19));
        [[cx, cy-ad,'up',dpadState.up],[cx,cy+ad,'down',dpadState.down],
         [cx-ad,cy,'left',dpadState.left],[cx+ad,cy,'right',dpadState.right]
        ].forEach(([ax,ay,dir,act]) => {
            drawTriangleEx(dctx, ax, ay, dir, triSz, act ? 'rgba(255,65,40,0.95)' : 'rgba(155,198,255,0.38)');
        });
        dctx.beginPath(); dctx.arc(cx, cy, R*0.18, 0, Math.PI*2);
        dctx.fillStyle = 'rgba(55,98,168,0.42)'; dctx.fill();
    }

    /** 依觸碰螢幕座標更新 dpadState（給側邊 d-pad canvas 用）*/
    function updateExtDpadDir(clientX, clientY) {
        const rect = dpadCvs.getBoundingClientRect();
        const dx = clientX - (rect.left + rect.width  / 2);
        const dy = clientY - (rect.top  + rect.height / 2);
        const dist = Math.sqrt(dx*dx + dy*dy);
        const dead = rect.width * 0.18;
        dpadState.up = dpadState.down = dpadState.left = dpadState.right = false;
        if (dist < dead) return;
        const adx = Math.abs(dx), ady = Math.abs(dy);
        if (dx > 0 && adx > ady*0.38) dpadState.right = true;
        if (dx < 0 && adx > ady*0.38) dpadState.left  = true;
        if (dy < 0 && ady > adx*0.38) dpadState.up    = true;
        if (dy > 0 && ady > adx*0.38) dpadState.down  = true;
    }

    // =====================================================
    //   主繪圖函式
    // =====================================================
    function draw() {
        ctx.clearRect(0, 0, CW, CH);

        // PK 大戰：獨立繪製
        if (phase === 'pk') { drawPKScreen(); return; }

        drawField();
        drawGoals();
        drawBall();
        drawActor(computer, 'AI');  // 電腦先畫（玩家在上層）
        drawActor(player, 'P1');
        // 搶斷衝刺閃光
        if (player.dashFrames > 0) {
            const alpha = (player.dashFrames / TACKLE_DASH_FRAMES) * 0.7;
            ctx.beginPath(); ctx.arc(player.x, player.y, PLAYER_R + 9, 0, Math.PI * 2);
            ctx.strokeStyle = `rgba(255,60,60,${alpha})`; ctx.lineWidth = 4; ctx.stroke();
        }
        drawTackleIndicator();      // 搶球倒數進度圈（在球員上層）
        if (phase === 'playing' && !isLandscapeMobile()) drawMobileControls();
        if (isLandscapeMobile()) { drawShootCvs(); drawDpadCvs(); } // 橫屏側邊控制
        drawHUD();

        // 各狀態的覆蓋層
        if (phase === 'goal')     drawGoalScreen();
        if (phase === 'paused')   drawPauseScreen();
        if (phase === 'halftime') drawHalftimeScreen();
        if (phase === 'start')    drawStartScreen();
        if (phase === 'gameover') drawGameOverScreen();

        // 回主選單按鈕：疊在所有層之上（進行中 / 暫停 / 進球 / 中場 均可見）
        if (phase !== 'start' && phase !== 'gameover') drawMenuBtn();
    }

    // =====================================================
    //   主更新函式
    // =====================================================
    function _triggerEnd() {
        playWhistleSound();
        if (playerScore === computerScore) { phase = 'pk'; initPK(); }
        else { phase = 'gameover'; }
    }

    function update() {
        // 暫停、開始選單、遊戲結束、中場休息 → 跳過遊戲邏輯
        if (phase === 'start' || phase === 'paused' || phase === 'gameover' || phase === 'halftime') return;

        // PK 大戰更新
        if (phase === 'pk') { updatePK(); return; }

        if (phase === 'goal') {
            goalTimer--;
            if (goalTimer <= 0) {
                if (gameFrames >= GAME_SECONDS * 60) {
                    _triggerEnd();
                } else if (currentHalf === 1 && gameFrames >= HALF_SECONDS * 60) {
                    phase = 'halftime'; playWhistleSound(); playHalftimeMusic();
                } else {
                    phase = 'playing'; initPositions();
                }
            }
            return;
        }

        // 倒數計時
        gameFrames++;

        // 上半場結束 → 中場休息
        if (currentHalf === 1 && gameFrames >= HALF_SECONDS * 60) {
            phase = 'halftime'; playWhistleSound(); playHalftimeMusic(); return;
        }
        // 下半場結束 → 遊戲結束 or PK
        if (gameFrames >= GAME_SECONDS * 60) {
            _triggerEnd(); return;
        }

        // 正常遊戲更新
        updatePlayer();
        updateComputer();
        checkCollisions();
        updateBall();
        checkGoals();
    }

    // =====================================================
    //   主迴圈 + 啟動
    // =====================================================
    function gameLoop() {
        update();
        draw();
        requestAnimationFrame(gameLoop);
    }

    // 點擊 canvas 時把焦點拉回 document，確保鍵盤事件正常觸發
    canvas.addEventListener('click', () => canvas.focus());
    canvas.setAttribute('tabindex', '0');
    canvas.focus();

    // =====================================================
    //   觸控輸入（手機 / 平板）
    //   射門按鈕（左下）＋ 圓形方向鍵（右下），均繪製於 Canvas
    // =====================================================

    /** 螢幕座標 → Canvas 內部座標（處理 CSS 縮放） */
    function getTouchPos(touch) {
        const rect = canvas.getBoundingClientRect();
        return {
            x: (touch.clientX - rect.left) * (CW / rect.width),
            y: (touch.clientY - rect.top)  * (CH / rect.height),
        };
    }

    /** 依觸碰位置更新 dpadState（支援斜向：兩方向同時激活）*/
    function updateCdpadDir(tx, ty) {
        const dx = tx - cdpad.cx, dy = ty - cdpad.cy;
        const dist = Math.sqrt(dx * dx + dy * dy);
        dpadState.up = dpadState.down = dpadState.left = dpadState.right = false;
        if (dist < cdpad.DEAD) return;
        const adx = Math.abs(dx), ady = Math.abs(dy);
        if (dx > 0 && adx > ady * 0.38) dpadState.right = true;
        if (dx < 0 && adx > ady * 0.38) dpadState.left  = true;
        if (dy < 0 && ady > adx * 0.38) dpadState.up    = true;
        if (dy > 0 && ady > adx * 0.38) dpadState.down  = true;
    }

    canvas.addEventListener('touchstart', e => {
        e.preventDefault();

        // 遊戲結束：點任何地方返回主選單
        if (phase === 'gameover') {
            phase = 'start'; playerScore = 0; computerScore = 0;
            gameFrames = 0; currentHalf = 1; initPositions(); return;
        }

        // 中場休息：點任何地方開始下半場
        if (phase === 'halftime') {
            currentHalf = 2; phase = 'playing';
            playWhistleSound(); initPositions(); return;
        }

        // PK 大戰
        if (phase === 'pk') {
            const t0 = e.changedTouches[0];
            if (t0) {
                const p = getTouchPos(t0);
                if (pk.subPhase === 'aim' && pk.turn === 'player') {
                    _pkFire();
                } else if (pk.turn === 'computer' &&
                           (pk.subPhase === 'aim' || pk.subPhase === 'fly')) {
                    // 偵測三個預測按鈕
                    const zone = _pkBtnHit(p.x, p.y);
                    if (zone) {
                        _pkGkPrediction(zone);
                    } else if (!isLandscapeMobile()) {
                        // 直屏：也允許圓形 D-pad 微調守門員
                        const cdx = p.x - cdpad.cx, cdy = p.y - cdpad.cy;
                        if (cdx*cdx + cdy*cdy < cdpad.R * cdpad.R && !cdpad.active) {
                            cdpad.active = true; cdpad.touchId = t0.identifier;
                            updateCdpadDir(p.x, p.y);
                        }
                    }
                } else if (pk.subPhase === 'done') {
                    phase = 'start'; playerScore = 0; computerScore = 0;
                    gameFrames = 0; currentHalf = 1; pk = null; initPositions();
                }
            }
            return;
        }

        // 開始畫面：點任何地方開始遊戲
        if (phase === 'start') { phase = 'playing'; gameFrames = 0; playWhistleSound(); return; }

        Array.from(e.changedTouches).forEach(t => {
            const p = getTouchPos(t);

            // 回主選單按鈕（左上角，任何狀態優先）
            if (p.x >= 6 && p.x <= 98 && p.y >= 10 && p.y <= 44) {
                phase = 'start'; playerScore = 0; computerScore = 0;
                gameFrames = 0; currentHalf = 1; pk = null; initPositions(); return;
            }

            // 暫停中：點非選單區繼續遊戲
            if (phase === 'paused') { phase = 'playing'; playWhistleSound(); return; }

            if (!isLandscapeMobile()) {
                // 射門按鈕（左下，直屏時才在主 canvas 偵測）
                const sdx = p.x - shootBtn.x, sdy = p.y - shootBtn.y;
                if (sdx*sdx + sdy*sdy < shootBtn.radius * shootBtn.radius) {
                    shootBtn.pressed = true; shootBtn.touchId = t.identifier;
                    if (phase === 'playing') {
                        if (player.hasBall) doPlayerShoot();
                        else doPlayerTackle();
                    }
                    return;
                }
                // 圓形方向鍵（右下，直屏時才在主 canvas 偵測）
                const cdx = p.x - cdpad.cx, cdy = p.y - cdpad.cy;
                if (cdx*cdx + cdy*cdy < cdpad.R * cdpad.R && !cdpad.active) {
                    cdpad.active = true; cdpad.touchId = t.identifier;
                    updateCdpadDir(p.x, p.y);
                }
            }
        });
    }, { passive: false });

    canvas.addEventListener('touchmove', e => {
        e.preventDefault();
        Array.from(e.changedTouches).forEach(t => {
            if (t.identifier === cdpad.touchId) {
                updateCdpadDir(getTouchPos(t).x, getTouchPos(t).y);
            }
        });
    }, { passive: false });

    canvas.addEventListener('touchend', e => {
        e.preventDefault();
        Array.from(e.changedTouches).forEach(t => {
            if (t.identifier === shootBtn.touchId) {
                shootBtn.pressed = false; shootBtn.touchId = null;
            }
            if (t.identifier === cdpad.touchId) {
                cdpad.active = false; cdpad.touchId = null;
                dpadState.up = dpadState.down = dpadState.left = dpadState.right = false;
            }
        });
    }, { passive: false });

    canvas.addEventListener('touchcancel', () => {
        shootBtn.pressed = false; shootBtn.touchId = null;
        cdpad.active = false; cdpad.touchId = null;
        dpadState.up = dpadState.down = dpadState.left = dpadState.right = false;
    }, { passive: false });

    // =====================================================
    //   側邊控制 canvas 觸控事件（橫屏專用）
    // =====================================================
    shootCvs.addEventListener('touchstart', e => {
        e.preventDefault();
        if (phase === 'gameover') { phase='start'; playerScore=0; computerScore=0; gameFrames=0; currentHalf=1; pk=null; initPositions(); return; }
        if (phase === 'halftime') { currentHalf=2; phase='playing'; playWhistleSound(); initPositions(); return; }
        if (phase === 'pk') {
            if (pk.subPhase==='aim' && pk.turn==='player') _pkFire();
            else if (pk.subPhase==='done') { phase='start'; playerScore=0; computerScore=0; gameFrames=0; currentHalf=1; pk=null; initPositions(); }
            return;
        }
        if (phase === 'start')  { phase='playing'; gameFrames=0; playWhistleSound(); return; }
        if (phase === 'paused') { phase='playing'; playWhistleSound(); return; }
        shootBtn.pressed = true;
        if (phase === 'playing') {
            if (player.hasBall) doPlayerShoot();
            else doPlayerTackle();
        }
    }, { passive: false });
    shootCvs.addEventListener('touchend',    () => { shootBtn.pressed = false; }, { passive: false });
    shootCvs.addEventListener('touchcancel', () => { shootBtn.pressed = false; }, { passive: false });

    let extDpadTouchId = null;
    dpadCvs.addEventListener('touchstart', e => {
        e.preventDefault();
        if (phase === 'gameover') { phase='start'; playerScore=0; computerScore=0; gameFrames=0; currentHalf=1; pk=null; initPositions(); return; }
        if (phase === 'halftime') { currentHalf=2; phase='playing'; playWhistleSound(); initPositions(); return; }
        if (phase === 'pk') {
            if (pk.subPhase === 'done') { phase='start'; playerScore=0; computerScore=0; gameFrames=0; currentHalf=1; pk=null; initPositions(); return; }
            // 電腦踢球時，橫屏 D-pad 可操控守門員
            if (pk.turn === 'computer') {
                const t = e.changedTouches[0];
                if (t && extDpadTouchId === null) { extDpadTouchId = t.identifier; updateExtDpadDir(t.clientX, t.clientY); }
            }
            return;
        }
        if (phase === 'start')  { phase='playing'; gameFrames=0; playWhistleSound(); return; }
        if (phase === 'paused') { phase='playing'; playWhistleSound(); return; }
        const t = e.changedTouches[0];
        if (extDpadTouchId === null) { extDpadTouchId = t.identifier; updateExtDpadDir(t.clientX, t.clientY); }
    }, { passive: false });
    dpadCvs.addEventListener('touchmove', e => {
        e.preventDefault();
        Array.from(e.changedTouches).forEach(t => {
            if (t.identifier === extDpadTouchId) updateExtDpadDir(t.clientX, t.clientY);
        });
    }, { passive: false });
    dpadCvs.addEventListener('touchend', e => {
        e.preventDefault();
        Array.from(e.changedTouches).forEach(t => {
            if (t.identifier === extDpadTouchId) {
                extDpadTouchId = null;
                dpadState.up = dpadState.down = dpadState.left = dpadState.right = false;
            }
        });
    }, { passive: false });
    dpadCvs.addEventListener('touchcancel', () => {
        extDpadTouchId = null;
        dpadState.up = dpadState.down = dpadState.left = dpadState.right = false;
    }, { passive: false });

    // =====================================================
    //   全螢幕控制
    // =====================================================
    function toggleFullscreen() {
        const el = document.documentElement;
        if (!document.fullscreenElement && !document.webkitFullscreenElement) {
            (el.requestFullscreen || el.webkitRequestFullscreen)?.call(el).catch(() => {});
        } else {
            (document.exitFullscreen || document.webkitExitFullscreen)?.call(document);
        }
    }

    const fsBtn = document.getElementById('fsBtn');

    // iOS Safari 不支援 requestFullscreen API，隱藏按鈕避免誤導
    const isIOS = /iPad|iPhone|iPod/.test(navigator.userAgent) ||
                  (navigator.platform === 'MacIntel' && navigator.maxTouchPoints > 1);
    if (isIOS) {
        fsBtn.style.display = 'none';
    } else {
        // Chrome Android 需要同時掛 click 與 touchend 才穩定觸發
        fsBtn.addEventListener('click', toggleFullscreen);
        fsBtn.addEventListener('touchend', e => { e.preventDefault(); toggleFullscreen(); }, { passive: false });
    }

    // 全螢幕狀態同步按鈕樣式
    function onFsChange() {
        const inFs = !!(document.fullscreenElement || document.webkitFullscreenElement);
        fsBtn.textContent = inFs ? '⊠' : '⛶';
        fsBtn.title       = inFs ? '離開全螢幕' : '全螢幕';
        fsBtn.classList.toggle('fs-on', inFs);
    }
    document.addEventListener('fullscreenchange',       onFsChange);
    document.addEventListener('webkitfullscreenchange', onFsChange);

    // 橫屏時自動嘗試全螢幕（Android Chrome；iOS 由瀏覽器自動處理）
    window.addEventListener('orientationchange', () => {
        setTimeout(() => {
            if (!isIOS && window.innerWidth > window.innerHeight && !document.fullscreenElement) {
                document.documentElement.requestFullscreen?.().catch(() => {});
            }
        }, 400);
    });

    initPositions();
    gameLoop();
    </script>
</body>
</html>
